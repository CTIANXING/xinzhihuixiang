<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心之回响 — Heart's Echo · AI Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #08081a;
  --bg-surface: rgba(255,255,255,0.04);
  --bg-glass: rgba(20,16,40,0.85);
  --bg-glass-hover: rgba(30,24,55,0.92);
  --border-glass: rgba(255,255,255,0.08);
  --border-glow: rgba(255,107,157,0.25);
  --accent-pink: #ff6b9d;
  --accent-pink-soft: #ff8fb3;
  --accent-lavender: #b388ff;
  --accent-gold: #f0c060;
  --accent-cyan: #64d8d8;
  --text-primary: #f0e6ff;
  --text-secondary: #b0a0cc;
  --text-muted: #6e6088;
  --shadow-glow: 0 0 40px rgba(255,107,157,0.15);
  --shadow-card: 0 8px 32px rgba(0,0,0,0.3);
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --transition-fast: 0.2s cubic-bezier(0.4,0,0.2,1);
  --transition-smooth: 0.4s cubic-bezier(0.4,0,0.2,1);
  --transition-spring: 0.5s cubic-bezier(0.34,1.56,0.64,1);
  --font-serif: 'Noto Serif SC', serif;
  --font-sans: 'Noto Sans SC', system-ui, sans-serif;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html { font-size:16px; scroll-behavior:smooth; }

body {
  font-family: var(--font-sans);
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed;
  inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 20%, rgba(255,107,157,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 70% at 80% 70%, rgba(179,136,255,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 50% 50%, rgba(100,216,216,0.03) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(255,107,157,0.3); border-radius:3px; }

#particles-canvas {
  position:fixed; inset:0; z-index:0; pointer-events:none;
}

/* === App Shell === */
#app-shell {
  position:relative;
  z-index:1;
  max-width:1300px;
  margin:0 auto;
  padding:0 24px;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* === Top Navigation === */
.top-nav {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:18px 0;
  position:sticky;
  top:0;
  z-index:100;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  background:rgba(8,8,26,0.7);
  border-bottom:1px solid var(--border-glass);
  gap:12px;
}

.nav-brand {
  font-family: var(--font-serif);
  font-size:1.4rem;
  font-weight:700;
  background: linear-gradient(135deg, var(--accent-pink), var(--accent-lavender));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:0.06em;
  cursor:pointer;
  user-select:none;
  transition: var(--transition-fast);
}
.nav-brand:hover {
  background: linear-gradient(135deg, var(--accent-pink-soft), var(--accent-gold));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

.nav-links {
  display:flex;
  gap:4px;
  background: var(--bg-glass);
  border:1px solid var(--border-glass);
  border-radius: var(--radius-lg);
  padding:4px;
  flex:1;
  justify-content:center;
}

.nav-link {
  display:flex;
  align-items:center;
  gap:6px;
  font-family: var(--font-sans);
  font-size:0.85rem;
  font-weight:500;
  color: var(--text-secondary);
  background:transparent;
  border:none;
  border-radius: var(--radius-md);
  padding:9px 16px;
  cursor:pointer;
  transition: all var(--transition-fast);
  white-space:nowrap;
}
.nav-link:hover { color: var(--text-primary); background: rgba(255,255,255,0.06); }
.nav-link.active {
  color: var(--text-primary);
  background: linear-gradient(135deg, rgba(255,107,157,0.2), rgba(179,136,255,0.15));
  box-shadow: 0 0 20px rgba(255,107,157,0.1);
}
.nav-link.highlight {
  border: 1px solid rgba(255,107,157,0.3);
}

.nav-link svg { width:16px; height:16px; flex-shrink:0; }

.nav-actions { display:flex; gap:8px; align-items:center; }

.nav-time {
  font-family: var(--font-serif);
  font-size:0.82rem;
  color: var(--text-muted);
  padding:7px 12px;
  background: var(--bg-glass);
  border:1px solid var(--border-glass);
  border-radius: var(--radius-md);
  display:flex;
  align-items:center;
  gap:6px;
}
.nav-time svg { width:14px; height:14px; opacity:0.6; }

.nav-icon-btn {
  width:36px; height:36px;
  border-radius:50%;
  border:1px solid var(--border-glass);
  background:var(--bg-glass);
  color:var(--text-secondary);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition: all var(--transition-fast);
}
.nav-icon-btn:hover { color:var(--text-primary); border-color:var(--border-glow); }
.nav-icon-btn svg { width:18px; height:18px; }

/* === Page Container === */
#page-container { flex:1; position:relative; padding:24px 0 60px; }
.page { display:none; animation: pageIn 0.5s cubic-bezier(0.4,0,0.2,1); }
.page.active { display:block; }

@keyframes pageIn {
  from { opacity:0; transform:translateY(16px); }
  to { opacity:1; transform:translateY(0); }
}

/* ========== HOME PAGE ========== */
.hero-section { text-align:center; padding:48px 0 32px; }
.hero-title {
  font-family:var(--font-serif); font-size:3.2rem; font-weight:900;
  background:linear-gradient(135deg,#ff6b9d 0%,#f0c060 30%,#b388ff 60%,#64d8d8 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  letter-spacing:0.12em; margin-bottom:6px;
  animation:titleShimmer 4s ease-in-out infinite; background-size:200% 200%;
}
@keyframes titleShimmer { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
.hero-subtitle { font-family:var(--font-serif); font-size:1.05rem; color:var(--text-secondary); letter-spacing:0.15em; }
.hero-tagline { font-size:0.85rem; color:var(--text-muted); letter-spacing:0.08em; margin-top:4px; }

.protagonists-grid { display:grid; grid-template-columns:1fr 1fr; gap:24px; margin:40px 0; }
.protag-card {
  background:var(--bg-glass); border:1px solid var(--border-glass);
  border-radius:var(--radius-xl); padding:28px; cursor:pointer;
  transition:all var(--transition-smooth); position:relative; overflow:hidden;
}
.protag-card::before { content:''; position:absolute; inset:0; border-radius:var(--radius-xl); opacity:0; transition:opacity var(--transition-smooth); z-index:0; }
.protag-card.male::before { background:radial-gradient(circle at 30% 20%, rgba(100,216,216,0.08), transparent 70%); }
.protag-card.female::before { background:radial-gradient(circle at 70% 20%, rgba(255,107,157,0.08), transparent 70%); }
.protag-card:hover::before { opacity:1; }
.protag-card:hover { transform:translateY(-4px); border-color:var(--border-glow); box-shadow:var(--shadow-glow); }
.protag-card>*{position:relative;z-index:1;}
.protag-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;}
.protag-avatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.8rem;border:2px solid var(--border-glass);}
.protag-card.male .protag-avatar{background:linear-gradient(135deg,rgba(100,216,216,0.2),rgba(100,180,216,0.15));}
.protag-card.female .protag-avatar{background:linear-gradient(135deg,rgba(255,107,157,0.2),rgba(255,143,179,0.15));}
.protag-info h3{font-family:var(--font-serif);font-size:1.4rem;font-weight:700;margin-bottom:4px;}
.protag-role{font-size:0.8rem;color:var(--text-secondary);letter-spacing:0.04em;}
.protag-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.stat-item{background:rgba(255,255,255,0.03);border-radius:var(--radius-sm);padding:10px 14px;}
.stat-label{font-size:0.72rem;color:var(--text-muted);margin-bottom:4px;letter-spacing:0.04em;}
.stat-value{font-family:var(--font-serif);font-size:1rem;font-weight:600;}
.stat-bar-wrap{width:100%;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;margin-top:6px;overflow:hidden;}
.stat-bar-fill{height:100%;border-radius:2px;transition:width 1s cubic-bezier(0.4,0,0.2,1);}
.stat-bar-fill.affection{background:linear-gradient(90deg,var(--accent-pink),var(--accent-gold));}
.stat-bar-fill.progress{background:linear-gradient(90deg,var(--accent-cyan),var(--accent-lavender));}

.quick-actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:8px;}
.quick-action-btn{
  display:flex;align-items:center;gap:8px;
  font-family:var(--font-sans);font-size:0.88rem;font-weight:500;
  color:var(--text-primary);background:var(--bg-glass);
  border:1px solid var(--border-glass);border-radius:var(--radius-lg);
  padding:13px 22px;cursor:pointer;transition:all var(--transition-fast);
}
.quick-action-btn:hover{background:var(--bg-glass-hover);border-color:var(--border-glow);transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,0.2);}
.quick-action-btn.primary{background:linear-gradient(135deg,rgba(255,107,157,0.25),rgba(179,136,255,0.12));border-color:rgba(255,107,157,0.3);}
.quick-action-btn svg{width:18px;height:18px;flex-shrink:0;}

/* ========== MAP PAGE ========== */
.map-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.map-title{font-family:var(--font-serif);font-size:1.5rem;font-weight:700;display:flex;align-items:center;gap:10px;}
.map-title svg{width:24px;height:24px;color:var(--accent-pink);}
.map-controls{display:flex;gap:8px;}
.map-control-btn{
  display:flex;align-items:center;gap:5px;
  font-family:var(--font-sans);font-size:0.8rem;font-weight:500;
  color:var(--text-primary);background:var(--bg-glass);
  border:1px solid var(--border-glass);border-radius:var(--radius-md);
  padding:9px 14px;cursor:pointer;transition:all var(--transition-fast);
}
.map-control-btn:hover{background:var(--bg-glass-hover);border-color:var(--border-glow);}
.map-control-btn.expand{background:linear-gradient(135deg,rgba(255,107,157,0.2),rgba(179,136,255,0.1));border-color:rgba(255,107,157,0.3);}
.map-control-btn svg{width:14px;height:14px;}

.map-grid{display:grid;gap:14px;padding:8px;}
.map-grid.size-2{grid-template-columns:repeat(2,1fr);}
.map-grid.size-3{grid-template-columns:repeat(3,1fr);}
.map-grid.size-4{grid-template-columns:repeat(4,1fr);}
.map-grid.size-5{grid-template-columns:repeat(5,1fr);}

.map-cell{
  aspect-ratio:1;min-height:170px;
  background:var(--bg-glass);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1px solid var(--border-glass);border-radius:var(--radius-lg);
  padding:18px;cursor:pointer;transition:all var(--transition-smooth);
  display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;
}
.map-cell::after{content:'';position:absolute;inset:0;border-radius:var(--radius-lg);opacity:0;transition:opacity var(--transition-smooth);pointer-events:none;}
.map-cell:hover{transform:translateY(-3px) scale(1.02);border-color:var(--border-glow);box-shadow:var(--shadow-glow);z-index:2;}
.map-cell:hover::after{opacity:1;background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(255,107,157,0.08),transparent 70%);}
.map-cell.occupied{border-color:rgba(255,107,157,0.2);}
.map-cell.empty{opacity:0.5;cursor:default;}
.map-cell.empty:hover{transform:none;border-color:var(--border-glass);box-shadow:none;}
.map-cell.empty:hover::after{opacity:0;}
.map-cell.add-slot{border-style:dashed;border-color:rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;opacity:0.6;}
.map-cell.add-slot:hover{opacity:1;border-color:var(--accent-lavender);transform:translateY(-3px) scale(1.02);}

.add-place-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px dashed rgba(255,255,255,0.25);color:var(--text-muted);transition:all var(--transition-spring);}
.add-place-icon svg{width:18px;height:18px;transition:transform var(--transition-spring);}
.map-cell.add-slot:hover .add-place-icon{border-color:var(--accent-lavender);color:var(--accent-lavender);border-style:solid;box-shadow:0 0 20px rgba(179,136,255,0.15);}
.map-cell.add-slot:hover .add-place-icon svg{transform:rotate(90deg);}

.location-name{font-family:var(--font-serif);font-size:1.1rem;font-weight:700;margin-bottom:4px;}
.location-desc{font-size:0.76rem;color:var(--text-secondary);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.location-chars{display:flex;gap:5px;margin-top:8px;}
.char-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:700;border:2px solid var(--border-glass);}
.char-dot.male{background:rgba(100,216,216,0.25);color:var(--accent-cyan);}
.char-dot.female{background:rgba(255,107,157,0.25);color:var(--accent-pink);}

/* ========== STORY PAGE ========== */
.story-header{margin-bottom:24px;}
.story-title{font-family:var(--font-serif);font-size:1.5rem;font-weight:700;display:flex;align-items:center;gap:10px;}
.story-title svg{width:24px;height:24px;color:var(--accent-gold);}
.story-chapter{font-size:0.82rem;color:var(--text-muted);margin-top:4px;}

.timeline{position:relative;padding-left:28px;}
.timeline::before{content:'';position:absolute;left:9px;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--accent-pink),var(--accent-lavender),transparent);}
.timeline-item{
  position:relative;margin-bottom:28px;padding:18px 22px;
  background:var(--bg-glass);border:1px solid var(--border-glass);
  border-radius:var(--radius-lg);transition:all var(--transition-fast);cursor:pointer;overflow:hidden;
}
.timeline-item::after{content:'';position:absolute;left:0;top:0;bottom:0;width:0;background:linear-gradient(90deg,rgba(255,107,157,0.08),transparent);transition:width var(--transition-smooth);}
.timeline-item:hover{border-color:var(--border-glow);box-shadow:0 4px 16px rgba(0,0,0,0.2);transform:translateX(4px);}
.timeline-item:hover::after{width:100%;}
.timeline-item::before{content:'';position:absolute;left:-24px;top:24px;width:10px;height:10px;border-radius:50%;background:var(--accent-pink);border:3px solid var(--bg-deep);box-shadow:0 0 10px rgba(255,107,157,0.4);}
.timeline-time{font-size:0.76rem;color:var(--text-muted);margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.timeline-time svg{width:13px;height:13px;}
.timeline-ep-title{font-family:var(--font-serif);font-size:1rem;font-weight:600;margin-bottom:6px;}
.timeline-preview{font-size:0.83rem;color:var(--text-secondary);line-height:1.6;}
.timeline-location{font-size:0.76rem;color:var(--text-muted);margin-top:8px;display:flex;align-items:center;gap:5px;}
.timeline-location svg{width:13px;height:13px;}

/* ========== CHARACTERS PAGE ========== */
.chars-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;}
.char-profile-card{
  background:var(--bg-glass);border:1px solid var(--border-glass);
  border-radius:var(--radius-xl);padding:24px;cursor:pointer;
  transition:all var(--transition-smooth);position:relative;overflow:hidden;
}
.char-profile-card::before{content:'';position:absolute;inset:0;border-radius:var(--radius-xl);opacity:0;transition:opacity var(--transition-smooth);pointer-events:none;}
.char-profile-card.male::before{background:radial-gradient(circle at 30% 20%,rgba(100,216,216,0.06),transparent 70%);}
.char-profile-card.female::before{background:radial-gradient(circle at 70% 20%,rgba(255,107,157,0.06),transparent 70%);}
.char-profile-card:hover::before{opacity:1;}
.char-profile-card:hover{transform:translateY(-3px);border-color:var(--border-glow);box-shadow:var(--shadow-card);}
.char-profile-top{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.char-profile-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.2rem;font-weight:700;border:2px solid var(--border-glass);}
.char-profile-avatar.male{background:rgba(100,216,216,0.2);}
.char-profile-avatar.female{background:rgba(255,107,157,0.2);}
.char-profile-name{font-family:var(--font-serif);font-size:1.15rem;font-weight:700;}
.char-profile-trait{font-size:0.76rem;color:var(--text-muted);margin-top:2px;}
.char-detail-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.char-detail-label{font-size:0.78rem;color:var(--text-muted);}
.char-detail-value{font-size:0.83rem;font-weight:500;}
.char-affection-bar{width:100%;height:5px;background:rgba(255,255,255,0.06);border-radius:3px;margin-top:14px;overflow:hidden;}
.char-affection-fill{height:100%;border-radius:3px;transition:width 1.2s cubic-bezier(0.4,0,0.2,1);}
.char-affection-fill.high{background:linear-gradient(90deg,var(--accent-pink),var(--accent-gold));}
.char-affection-fill.medium{background:linear-gradient(90deg,var(--accent-cyan),var(--accent-lavender));}
.char-affection-label{display:flex;justify-content:space-between;margin-top:6px;font-size:0.73rem;color:var(--text-muted);}

/* ========== GAME PAGE (LLM Interaction) ========== */
.game-layout{display:grid;grid-template-columns:1fr 320px;gap:20px;height:calc(100vh - 140px);min-height:600px;}

.game-main{
  display:flex;flex-direction:column;
  background:var(--bg-glass);border:1px solid var(--border-glass);
  border-radius:var(--radius-xl);overflow:hidden;
}

.game-scene-header{
  padding:16px 24px;
  border-bottom:1px solid var(--border-glass);
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,255,255,0.02);
}

.game-scene-title{
  font-family:var(--font-serif);font-size:1.1rem;font-weight:600;
  display:flex;align-items:center;gap:8px;
}
.game-scene-title svg{width:18px;height:18px;color:var(--accent-gold);}

.game-scene-info{font-size:0.78rem;color:var(--text-muted);}

.game-text-area{
  flex:1;overflow-y:auto;padding:24px 28px;
  display:flex;flex-direction:column;gap:16px;
}

.game-msg{
  animation:msgIn 0.4s cubic-bezier(0.4,0,0.2,1);
  padding:16px 20px;
  border-radius:var(--radius-md);
  line-height:1.9;
  font-size:0.95rem;
}

@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.game-msg.user{
  align-self:flex-end;
  max-width:75%;
  background:linear-gradient(135deg,rgba(100,216,216,0.15),rgba(100,180,216,0.08));
  border:1px solid rgba(100,216,216,0.2);
  color:var(--text-primary);
}

.game-msg.assistant{
  align-self:flex-start;
  max-width:85%;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border-glass);
}

.game-msg .msg-role{
  font-size:0.72rem;font-weight:600;color:var(--text-muted);
  margin-bottom:6px;letter-spacing:0.04em;
}

.game-msg .msg-thinking-toggle{
  font-size:0.78rem;color:var(--accent-lavender);cursor:pointer;
  padding:6px 12px;background:rgba(179,136,255,0.08);
  border-radius:var(--radius-sm);display:inline-block;
  margin-top:8px;transition:all var(--transition-fast);
}
.game-msg .msg-thinking-toggle:hover{background:rgba(179,136,255,0.15);}

.game-msg .msg-thinking-content{
  margin-top:8px;padding:12px 16px;
  background:rgba(179,136,255,0.06);border-left:2px solid var(--accent-lavender);
  border-radius:0 var(--radius-sm) var(--radius-sm) 0;
  font-size:0.83rem;color:var(--text-secondary);line-height:1.7;
  display:none;
}
.game-msg .msg-thinking-content.open{display:block;}

.game-options-area{
  padding:16px 24px;
  border-top:1px solid var(--border-glass);
  display:flex;flex-wrap:wrap;gap:10px;
  background:rgba(255,255,255,0.02);
}

.game-option-btn{
  font-family:var(--font-sans);font-size:0.85rem;font-weight:500;
  padding:10px 20px;border-radius:var(--radius-md);
  cursor:pointer;transition:all var(--transition-fast);
  border:1px solid var(--border-glass);
  background:var(--bg-glass);color:var(--text-primary);
  position:relative;overflow:hidden;
}
.game-option-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,107,157,0.2),rgba(179,136,255,0.1));
  opacity:0;transition:opacity var(--transition-fast);
}
.game-option-btn:hover::before{opacity:1;}
.game-option-btn:hover{
  border-color:var(--border-glow);transform:translateY(-2px);
  box-shadow:0 4px 16px rgba(0,0,0,0.25);
}

.game-input-area{
  padding:14px 24px;
  border-top:1px solid var(--border-glass);
  display:flex;gap:10px;
  background:rgba(0,0,0,0.2);
}

.game-input{
  flex:1;
  font-family:var(--font-sans);font-size:0.88rem;
  color:var(--text-primary);background:rgba(255,255,255,0.05);
  border:1px solid var(--border-glass);border-radius:var(--radius-sm);
  padding:12px 16px;outline:none;transition:all var(--transition-fast);
}
.game-input:focus{border-color:var(--accent-lavender);box-shadow:0 0 0 3px rgba(179,136,255,0.08);}

.game-send-btn{
  font-family:var(--font-sans);font-size:0.85rem;font-weight:600;
  padding:0 20px;border-radius:var(--radius-sm);
  cursor:pointer;transition:all var(--transition-fast);white-space:nowrap;
  border:none;
  background:linear-gradient(135deg,var(--accent-pink),var(--accent-lavender));
  color:#fff;
}
.game-send-btn:hover{opacity:0.9;transform:translateY(-1px);box-shadow:0 4px 16px rgba(255,107,157,0.3);}
.game-send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}

/* Game Sidebar */
.game-sidebar{
  display:flex;flex-direction:column;gap:14px;
}

.sidebar-panel{
  background:var(--bg-glass);border:1px solid var(--border-glass);
  border-radius:var(--radius-lg);padding:18px;
}

.sidebar-panel-title{
  font-family:var(--font-serif);font-size:0.85rem;font-weight:700;
  color:var(--text-secondary);margin-bottom:12px;
  letter-spacing:0.04em;display:flex;align-items:center;gap:6px;
}
.sidebar-panel-title svg{width:15px;height:15px;}

.var-list{display:flex;flex-direction:column;gap:6px;}
.var-row{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:rgba(255,255,255,0.03);border-radius:var(--radius-sm);font-size:0.8rem;}
.var-name{color:var(--text-muted);}
.var-value{font-weight:600;}

.sum-text{font-size:0.82rem;color:var(--text-secondary);line-height:1.6;}

.chat-session-list{display:flex;flex-direction:column;gap:4px;max-height:200px;overflow-y:auto;}
.chat-session-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;border-radius:var(--radius-sm);
  font-size:0.8rem;cursor:pointer;transition:all var(--transition-fast);
  background:transparent;
}
.chat-session-item:hover{background:rgba(255,255,255,0.04);}
.chat-session-item.active{background:rgba(255,107,157,0.12);color:var(--accent-pink);}
.chat-session-item .session-del-btn{
  width:22px;height:22px;border-radius:50%;border:none;
  background:transparent;color:var(--text-muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:0.7rem;
  opacity:0;transition:all var(--transition-fast);
}
.chat-session-item:hover .session-del-btn{opacity:1;}
.chat-session-item .session-del-btn:hover{background:rgba(255,80,80,0.2);color:#ff5050;}

/* ========== MODALS ========== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.65);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  z-index:500;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity var(--transition-smooth);
}
.modal-overlay.open{opacity:1;pointer-events:auto;}

.modal-panel{
  background:var(--bg-glass);border:1px solid var(--border-glass);
  border-radius:var(--radius-xl);max-width:620px;width:92%;
  max-height:85vh;overflow-y:auto;
  transform:translateY(20px) scale(0.96);
  transition:transform var(--transition-spring);
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}
.modal-panel.wide{max-width:800px;}
.modal-overlay.open .modal-panel{transform:translateY(0) scale(1);}

.modal-header{
  padding:24px 24px 0;
  display:flex;align-items:flex-start;justify-content:space-between;
}
.modal-title{font-family:var(--font-serif);font-size:1.35rem;font-weight:700;}
.modal-subtitle{font-size:0.8rem;color:var(--text-muted);margin-top:4px;}
.modal-close{
  width:34px;height:34px;border-radius:50%;
  border:1px solid var(--border-glass);background:transparent;
  color:var(--text-secondary);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--transition-fast);flex-shrink:0;
}
.modal-close:hover{background:rgba(255,255,255,0.08);color:var(--text-primary);}
.modal-body{padding:20px 24px 24px;}

/* Form elements */
.form-group{margin-bottom:14px;}
.form-label{font-size:0.78rem;color:var(--text-secondary);margin-bottom:5px;display:block;letter-spacing:0.03em;}
.form-input,.form-textarea{
  width:100%;font-family:var(--font-sans);font-size:0.87rem;
  color:var(--text-primary);background:rgba(255,255,255,0.05);
  border:1px solid var(--border-glass);border-radius:var(--radius-sm);
  padding:10px 14px;transition:all var(--transition-fast);outline:none;
}
.form-input:focus,.form-textarea:focus{border-color:var(--accent-lavender);box-shadow:0 0 0 3px rgba(179,136,255,0.1);}
.form-textarea{resize:vertical;min-height:70px;line-height:1.6;}
.form-select{
  width:100%;font-family:var(--font-sans);font-size:0.87rem;
  color:var(--text-primary);background:rgba(255,255,255,0.05);
  border:1px solid var(--border-glass);border-radius:var(--radius-sm);
  padding:10px 14px;cursor:pointer;outline:none;transition:all var(--transition-fast);
}
.form-select:focus{border-color:var(--accent-lavender);}

.modal-actions{display:flex;gap:10px;flex-wrap:wrap;}
.modal-action-btn{
  display:flex;align-items:center;gap:6px;
  font-family:var(--font-sans);font-size:0.82rem;font-weight:500;
  padding:9px 16px;border-radius:var(--radius-sm);
  cursor:pointer;transition:all var(--transition-fast);
  border:1px solid var(--border-glass);
  background:var(--bg-glass);color:var(--text-primary);
}
.modal-action-btn:hover{background:var(--bg-glass-hover);border-color:var(--border-glow);transform:translateY(-1px);}
.modal-action-btn.primary{background:linear-gradient(135deg,rgba(255,107,157,0.3),rgba(179,136,255,0.15));border-color:rgba(255,107,157,0.3);}
.modal-action-btn.danger{color:#ff7070;border-color:rgba(255,100,100,0.3);}
.modal-action-btn.danger:hover{background:rgba(255,80,80,0.15);}
.modal-action-btn.small{padding:6px 12px;font-size:0.75rem;}

/* Tabs */
.tab-bar{display:flex;gap:2px;background:rgba(255,255,255,0.03);border-radius:var(--radius-sm);padding:3px;margin-bottom:18px;}
.tab-btn{
  flex:1;font-family:var(--font-sans);font-size:0.8rem;font-weight:500;
  padding:8px 12px;border:none;border-radius:var(--radius-sm);
  background:transparent;color:var(--text-secondary);cursor:pointer;
  transition:all var(--transition-fast);text-align:center;
}
.tab-btn:hover{color:var(--text-primary);}
.tab-btn.active{background:rgba(255,107,157,0.2);color:var(--accent-pink-soft);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* Checklist */
.checklist{display:flex;flex-direction:column;gap:4px;max-height:160px;overflow-y:auto;}
.checklist-item{
  display:flex;align-items:center;gap:8px;padding:6px 10px;
  border-radius:var(--radius-sm);font-size:0.82rem;cursor:pointer;
  transition:all var(--transition-fast);
}
.checklist-item:hover{background:rgba(255,255,255,0.04);}
.checklist-item input[type=checkbox]{accent-color:var(--accent-pink);cursor:pointer;}

/* Item list */
.item-list{display:flex;flex-direction:column;gap:6px;}
.item-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:rgba(255,255,255,0.03);
  border-radius:var(--radius-sm);transition:all var(--transition-fast);
}
.item-row:hover{background:rgba(255,255,255,0.06);}
.item-name{font-size:0.85rem;font-weight:500;flex:1;}
.item-meta{font-size:0.73rem;color:var(--text-muted);margin-left:10px;}
.item-actions{display:flex;gap:4px;}

/* Status badge */
.status-badge{
  display:inline-block;font-size:0.7rem;font-weight:600;
  padding:3px 10px;border-radius:10px;
}
.status-badge.ok{background:rgba(100,216,150,0.15);color:#64d896;}
.status-badge.warn{background:rgba(240,192,96,0.15);color:var(--accent-gold);}
.status-badge.err{background:rgba(255,100,100,0.15);color:#ff6464;}

/* Toast */
.toast-container{
  position:fixed;top:20px;right:20px;z-index:1000;
  display:flex;flex-direction:column;gap:8px;pointer-events:none;
}
.toast{
  display:flex;align-items:center;gap:10px;
  background:rgba(20,16,40,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border-glass);border-radius:var(--radius-md);
  padding:12px 18px;pointer-events:auto;
  transform:translateX(120%);opacity:0;
  transition:all var(--transition-spring);
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
  min-width:260px;
}
.toast.visible{transform:translateX(0);opacity:1;}
.toast-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.toast-icon.success{background:rgba(100,216,150,0.2);color:#64d896;}
.toast-icon.info{background:rgba(100,216,216,0.2);color:var(--accent-cyan);}
.toast-icon.warning{background:rgba(240,192,96,0.2);color:var(--accent-gold);}
.toast-message{font-size:0.83rem;flex:1;}
.toast-close{background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px;transition:color var(--transition-fast);}
.toast-close:hover{color:var(--text-primary);}

/* Confirm */
.confirm-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.5);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  z-index:600;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity var(--transition-smooth);
}
.confirm-overlay.open{opacity:1;pointer-events:auto;}
.confirm-panel{
  background:var(--bg-glass);border:1px solid var(--border-glass);
  border-radius:var(--radius-lg);padding:24px;max-width:380px;width:90%;
  transform:translateY(20px);transition:transform var(--transition-spring);
}
.confirm-overlay.open .confirm-panel{transform:translateY(0);}
.confirm-message{font-size:0.92rem;margin-bottom:18px;line-height:1.6;}
.confirm-buttons{display:flex;gap:8px;justify-content:flex-end;}
.confirm-btn{
  font-family:var(--font-sans);font-size:0.82rem;font-weight:500;
  padding:9px 18px;border-radius:var(--radius-sm);cursor:pointer;
  transition:all var(--transition-fast);border:1px solid var(--border-glass);
}
.confirm-btn.cancel{background:transparent;color:var(--text-secondary);}
.confirm-btn.confirm-action{background:linear-gradient(135deg,rgba(255,107,157,0.4),rgba(179,136,255,0.2));border-color:rgba(255,107,157,0.3);color:var(--text-primary);}

/* Empty state */
.empty-state{
  text-align:center;padding:40px 20px;color:var(--text-muted);
}
.empty-state svg{width:40px;height:40px;margin-bottom:12px;opacity:0.4;}
.empty-state p{font-size:0.85rem;}

/* Loading dots */
.loading-dots{display:flex;gap:6px;align-items:center;padding:8px 0;}
.loading-dots span{width:8px;height:8px;border-radius:50%;background:var(--accent-pink);animation:dotBounce 1.4s infinite ease-in-out both;}
.loading-dots span:nth-child(2){animation-delay:0.16s;}
.loading-dots span:nth-child(3){animation-delay:0.32s;}
@keyframes dotBounce{0%,80%,100%{transform:scale(0.4);opacity:0.4}40%{transform:scale(1);opacity:1}}

/* Responsive */
@media(max-width:768px){
  .game-layout{grid-template-columns:1fr;height:auto;}
  .game-sidebar{display:none;}
  .protagonists-grid{grid-template-columns:1fr;}
  .hero-title{font-size:2rem;}
  .nav-link span{display:none;}
  .nav-link{padding:9px 10px;}
  .map-grid.size-3,.map-grid.size-4,.map-grid.size-5{grid-template-columns:repeat(2,1fr);}
  .chars-grid{grid-template-columns:1fr;}
}
</style>

// ==================== PARTICLES ====================
function initParticles() {
  const canvas = document.getElementById('particles-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  class Particle {
    constructor() { this.reset(); this.y = Math.random() * canvas.height; }
    reset() { this.x = Math.random() * canvas.width; this.y = -10; this.size = Math.random() * 2.5 + 1; this.speedY = Math.random() * 0.4 + 0.15; this.speedX = (Math.random() - 0.5) * 0.3; this.opacity = Math.random() * 0.35 + 0.08; this.wobble = Math.random() * Math.PI * 2; this.wobbleSpeed = Math.random() * 0.015 + 0.005; }
    update() { this.wobble += this.wobbleSpeed; this.x += this.speedX + Math.sin(this.wobble) * 0.2; this.y += this.speedY; if(this.y > canvas.height + 10) this.reset(); if(this.x < -10) this.x = canvas.width + 10; if(this.x > canvas.width + 10) this.x = -10; }
    draw(ctx) { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fillStyle = `rgba(255,182,193,${this.opacity})`; ctx.fill(); }
  }
  for(let i=0;i<50;i++) particles.push(new Particle());
  function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.update();p.draw(ctx);}); requestAnimationFrame(animate); }
  animate();
}

// ==================== GAME PAGE (LLM) ====================
async function handleGameSend(){
  const input = document.getElementById('game-input');
  const text = input.value.trim();
  if(!text) return;

  if(!storeReady){
    showToast('系统正在初始化，请稍候...','warning');
    return;
  }

  const st = sillytavernStore;
  if(!st.settings?.api?.apiKey){
    showToast('请先在设置中配置 API Key','warning');
    openSettingsModal();
    return;
  }

  // Create chat if none active
  if(!st.activeChatId) {
    try { await st.createChat(); } catch(e) { showToast('创建会话失败: ' + e.message, 'warning'); return; }
  }

  input.value = '';
  input.disabled = true;
  document.getElementById('game-send-btn').disabled = true;
  document.getElementById('game-options-area').innerHTML = '';
  currentOptions = [];

  // Show loading
  const textArea = document.getElementById('game-text-area');
  const empty = textArea.querySelector('.empty-state');
  if(empty) empty.style.display = 'none';
  document.getElementById('game-loading').style.display = 'block';

  // Append user message to display
  appendGameMessage('user', text, null);

  try {
    const st = sillytavernStore;
    const settings = st.settings;
    const activeChat = st.activeChat;
    if(!settings || !activeChat) throw new Error('No active context');

    const activePreset = st.presets.find(p=>p.id===settings.activePresetId) || st.presets[0];
    if(!activePreset) throw new Error('No preset available');

    const activeBooks = st.lorebooks.filter(b=>st.activeLorebookIds.includes(b.id));
    const currentVars = activeChat.variables || {};

    // Assemble prompt via store's internal logic
    const userMsg = { id: crypto.randomUUID(), role: 'user', content: text, timestamp: Date.now(), variables: { ...currentVars } };
    const updatedMsgs = [...activeChat.messages, userMsg];

    // Build request
    const { messages: promptMsgs } = assemblePrompt({
      userInput: text,
      history: updatedMsgs,
      preset: activePreset,
      lorebooks: activeBooks,
      userName: settings.userName,
      characterName: settings.characterName,
      variables: currentVars,
      formatPrompt: settings.formatPromptTemplate || DEFAULT_FORMAT_PROMPT,
    });

    const body = {
      model: activePreset.settings.openai_model || settings.api.model,
      messages: promptMsgs,
      temperature: activePreset.settings.temp_openai ?? 0.8,
      max_tokens: activePreset.settings.openai_max_tokens ?? 2048,
      top_p: activePreset.settings.top_p_openai ?? 0.9,
      frequency_penalty: activePreset.settings.freq_pen_openai ?? 0,
      presence_penalty: activePreset.settings.pres_pen_openai ?? 0,
      stream: false,
    };

    const resp = await fetch(`${settings.api.baseUrl}/chat/completions`, {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${settings.api.apiKey}` },
      body: JSON.stringify(body),
    });

    if(!resp.ok) throw new Error(`API error ${resp.status}: ${await resp.text().then(t=>t.slice(0,200))}`);

    const data = await resp.json();
    const rawReply = data.choices?.[0]?.message?.content || '';

    // Parse tags
    const parser = makeParser();
    const events = parser.feed(rawReply);
    const finalEvents = parser.finish();
    const allEvents = [...events, ...finalEvents];
    const parsed = aggregateEvents(allEvents);

    // Update variables
    const { nextVariables } = applyParsedToChat(currentVars, parsed);

    // Save as chat message
    const assistantMsg = {
      id: crypto.randomUUID(), role: 'assistant', content: rawReply, timestamp: Date.now(),
      variables: { ...nextVariables }, parsed,
    };

    // Manually update the chat (bypassing store's sendMessage for game mode tag parsing)
    const chats = await getChats();
    const chat = chats.find(c=>c.id===activeChat.id);
    if(chat){
      const updatedChat = { ...chat, messages: [...updatedMsgs, assistantMsg], variables: nextVariables, updatedAt: Date.now() };
      await saveChat(updatedChat);
    }

    // Refresh store
    await st.loadAll();
    if(chat){
      const freshChats = await getChats();
      const freshChat = freshChats.find(c=>c.id===activeChat.id);
      if(freshChat) st.loadChat(freshChat.id);
    }

    // Display
    appendGameMessage('assistant', parsed.maintext, { thinking: parsed.thinking, sum: parsed.sum, raw: rawReply });

    // Options
    if(parsed.options && parsed.options.length > 0){
      currentOptions = parsed.options.filter(o=>o.trim());
      renderGameOptions(currentOptions);
    }

    // Update sidebar
    renderGameVars(nextVariables);
    if(parsed.sum) document.getElementById('sum-text').textContent = parsed.sum;

  } catch(e) {
    showToast('请求失败: ' + e.message, 'warning');
  } finally {
    document.getElementById('game-loading').style.display = 'none';
    document.getElementById('game-input').disabled = false;
    document.getElementById('game-send-btn').disabled = false;
    document.getElementById('game-input').focus();
    refreshGameUI();
  }
}

function refreshGameUI(){
  const st = sillytavernStore;
  const list = document.getElementById('chat-session-list');
  if(!st.chats.length){
    list.innerHTML = '<div style="font-size:0.78rem;color:var(--text-muted);padding:8px;">暂无会话</div>';
  } else {
    list.innerHTML = st.chats.map(c=>`
      <div class="chat-session-item ${c.id===st.activeChatId?'active':''}" id="session-${c.id}" onclick="handleSelectChat('${c.id}')">
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(c.name||'未命名')}</span>
        <button class="session-del-btn" onclick="event.stopPropagation();handleDeleteChat('${c.id}')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>`).join('');
  }

  // Load chat messages
  const activeChat = st.activeChat;
  if(activeChat && activeChat.messages.length > 0){
    const area = document.getElementById('game-text-area');
    const empty = area.querySelector('.empty-state');
    if(empty) empty.style.display = 'none';
    // Show last few messages
    const recent = activeChat.messages.slice(-10);
    for(const msg of recent){
      const existing = document.getElementById('gm-rendered-'+msg.id);
      if(!existing){
        const role = msg.role;
        const parsed = msg.parsed;
        if(parsed){
          appendGameMessage(role, parsed.maintext||msg.content.slice(0,200), { thinking: parsed.thinking, sum: parsed.sum });
        } else {
          appendGameMessage(role, msg.content.slice(0,500), null);
        }
        const lastDiv = area.lastElementChild;
        if(lastDiv) lastDiv.id = 'gm-rendered-'+msg.id;
      }
    }
    // Vars
    renderGameVars(activeChat.variables||{});
  }

  document.getElementById('game-scene-info').textContent = st.settings?.api?.model ? `模型: ${st.settings.api.model}` : '';
}

      <div style="display:flex;gap:8px;margin-top:16px;">
        <button class="modal-action-btn primary" onclick="saveSettingsFromModal()" id="btn-save-settings">保存设置</button>
        <button class="modal-action-btn" onclick="openPresetModal()" id="btn-open-presets">管理预设</button>
      </div>
    </div>`;
  document.getElementById('modal-settings').classList.add('open');
}
window.openSettingsModal = openSettingsModal;

async function saveSettingsFromModal(){
  const st = sillytavernStore;
  const updates = {
    api: {
      baseUrl: document.getElementById('s-baseUrl').value.trim(),
      apiKey: document.getElementById('s-apiKey').value.trim(),
      model: document.getElementById('s-model').value.trim(),
      timeout: 60000,
      secondary: st.settings?.api?.secondary || { enabled:false, baseUrl:'', apiKey:'', model:'' },
    },
    userName: document.getElementById('s-userName').value.trim(),
    characterName: document.getElementById('s-characterName').value.trim(),
    formatPromptTemplate: document.getElementById('s-formatPrompt').value.trim(),
  };
  await st.updateSettings(updates);
  await st.loadAll();
  closeModal('modal-settings');
  showToast('设置已保存','success');
  refreshGameUI();
}
window.saveSettingsFromModal = saveSettingsFromModal;

async function fetchModelList(){
  const baseUrl = document.getElementById('s-baseUrl').value.trim();
  const apiKey = document.getElementById('s-apiKey').value.trim();
  const container = document.getElementById('s-model-list');
  container.innerHTML = '<span style="font-size:0.78rem;color:var(--text-muted);">获取中...</span>';
  try{
    const result = await fetchModels({ baseUrl, apiKey });
    container.innerHTML = `
      <div style="font-size:0.73rem;color:var(--text-muted);margin-bottom:6px;">来源: ${result.source==='remote'?'远程':'本地推测'} ${result.error?`(${result.error})`:''}</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;">${result.models.map(m=>`<button class="modal-action-btn small" onclick="document.getElementById('s-model').value='${m}';" style="font-size:0.72rem;">${m}</button>`).join('')}</div>`;
  }catch(e){
    container.innerHTML = `<span class="status-badge err">获取失败</span>`;
  }
}
window.fetchModelList = fetchModelList;

async function testApiConnection(){
  const baseUrl = document.getElementById('s-baseUrl').value.trim();
  const apiKey = document.getElementById('s-apiKey').value.trim();
  const model = document.getElementById('s-model').value.trim();
  const statusEl = document.getElementById('s-conn-status');
  statusEl.innerHTML = '<span class="status-badge warn">测试中...</span>';
  try{
    const result = await testConnection({ baseUrl, apiKey, model });
    statusEl.innerHTML = result.ok ? '<span class="status-badge ok">连接成功</span>' : `<span class="status-badge err">失败: ${result.error||result.errorBody||result.status}</span>`;
  }catch(e){
    statusEl.innerHTML = `<span class="status-badge err">错误: ${e.message}</span>`;
  }
}
window.testApiConnection = testApiConnection;

// ==================== LOREBOOK MODAL ====================
async function openLorebookModal(){
  const st = sillytavernStore;
  const books = st.lorebooks;
  const activeIds = st.activeLorebookIds;
  const panel = document.getElementById('modal-lorebook-panel');
  panel.innerHTML = `
    <div class="modal-header"><div><div class="modal-title">世界书管理</div><div class="modal-subtitle">管理场景背景、角色设定与世界观信息</div></div><button class="modal-close" onclick="closeModal('modal-lorebook')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="modal-body">
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchLorebookTab('list')" id="lorebook-tab-list">我的世界书</button>
        <button class="tab-btn" onclick="switchLorebookTab('import')" id="lorebook-tab-import">导入</button>
        <button class="tab-btn" onclick="switchLorebookTab('create')" id="lorebook-tab-create">创建</button>
      </div>
      <div class="tab-panel active" id="lorebook-panel-list">
        ${books.length===0?`<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><p>暂无世界书</p></div>`:
        `<div class="checklist">${books.map(b=>`<label class="checklist-item"><input type="checkbox" ${activeIds.includes(b.id)?'checked':''} onchange="toggleLorebookActive('${b.id}')" id="lb-active-${b.id}"><span class="item-name">${escapeHtml(b.name)}</span><span class="item-meta">${b.entries.length} 条目</span><span style="flex:1;"></span><button class="modal-action-btn small danger" onclick="event.stopPropagation();handleDeleteLorebook('${b.id}')" style="font-size:0.7rem;">删除</button></label>`).join('')}</div>`}
      </div>
      <div class="tab-panel" id="lorebook-panel-import">
        <div class="form-group"><label class="form-label">粘贴 SillyTavern JSON</label><textarea class="form-textarea" id="lb-import-json" rows="6" placeholder='{"name":"...","entries":{...}}'></textarea></div>
        <button class="modal-action-btn primary" onclick="handleImportLorebook()" id="btn-import-lorebook">导入</button>
      </div>
      <div class="tab-panel" id="lorebook-panel-create">
        <div class="form-group"><label class="form-label">世界书名称</label><input class="form-input" id="lb-create-name" placeholder="例如：校园日常设定"></div>
        <div class="form-group"><label class="form-label">描述</label><input class="form-input" id="lb-create-desc" placeholder="简要描述此书包含的世界设定"></div>
        <button class="modal-action-btn primary" onclick="handleCreateLorebook()" id="btn-create-lorebook">创建</button>
      </div>
    </div>`;
  document.getElementById('modal-lorebook').classList.add('open');
}
window.openLorebookModal = openLorebookModal;

function switchLorebookTab(tab){
  document.querySelectorAll('#modal-lorebook .tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('#modal-lorebook .tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('lorebook-tab-'+tab).classList.add('active');
  document.getElementById('lorebook-panel-'+tab).classList.add('active');
}
window.switchLorebookTab = switchLorebookTab;

async function toggleLorebookActive(id){ await sillytavernStore.toggleLorebook(id); await sillytavernStore.loadAll(); }
window.toggleLorebookActive = toggleLorebookActive;

async function handleDeleteLorebook(id){
  showConfirm('确定删除此世界书？',async()=>{
    await sillytavernStore.deleteLorebook(id);
    await sillytavernStore.loadAll();
    closeModal('modal-lorebook');
    openLorebookModal();
    showToast('已删除','info');
  });
}
window.handleDeleteLorebook = handleDeleteLorebook;

async function handleImportLorebook(){
  const json=document.getElementById('lb-import-json').value.trim();
  if(!json){showToast('请粘贴 JSON 内容','warning');return;}
  try{
    const data=JSON.parse(json);
    const result=importLorebook(data);
    const book = { ...result, id: crypto.randomUUID(), createdAt: Date.now(), updatedAt: Date.now() };
    await sillytavernStore.saveLorebook(book);
    await sillytavernStore.loadAll();
    closeModal('modal-lorebook');
    openLorebookModal();
    showToast(`已导入世界书「${book.name}」`,'success');
  }catch(e){showToast('导入失败: '+e.message,'warning');}
}
window.handleImportLorebook = handleImportLorebook;

async function handleCreateLorebook(){
  const name=document.getElementById('lb-create-name').value.trim();
  const desc=document.getElementById('lb-create-desc').value.trim();
  if(!name){showToast('请输入名称','warning');return;}
  const book=createDefaultLorebook(name);
  book.description=desc||'';
  book.entries=[createDefaultEntry()];
  book.entries[0].content='在这里编写世界观设定...';
  book.entries[0].keys=['故事背景','设定'];
  await sillytavernStore.saveLorebook(book);
  await sillytavernStore.loadAll();
  closeModal('modal-lorebook');
  openLorebookModal();
  showToast(`已创建世界书「${name}」`,'success');
}
window.handleCreateLorebook = handleCreateLorebook;

// ==================== PRESET MODAL ====================
async function openPresetModal(){
  const st = sillytavernStore;
  const presets = st.presets;
  const panel = document.getElementById('modal-preset-panel');
  panel.innerHTML = `
    <div class="modal-header"><div><div class="modal-title">预设管理</div><div class="modal-subtitle">管理采样参数与提示词配置</div></div><button class="modal-close" onclick="closeModal('modal-preset')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="modal-body">
      <div class="item-list">${presets.map(p=>`
        <div class="item-row">
          <span class="item-name">${escapeHtml(p.name)}</span>
          <span class="item-meta">${escapeHtml(p.settings.openai_model||'N/A')}</span>
          ${st.settings?.activePresetId===p.id?`<span class="status-badge ok" style="margin:0 6px;">当前</span>`:''}
          <div class="item-actions">
            <button class="modal-action-btn small" onclick="handleSelectPreset('${p.id}')">选用</button>
            <button class="modal-action-btn small danger" onclick="handleDeletePreset('${p.id}')">删除</button>
          </div>
        </div>`).join('')}</div>
      <button class="modal-action-btn primary" style="margin-top:12px;width:100%;justify-content:center;" onclick="handleCreatePreset()" id="btn-create-preset">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> 新建预设
      </button>
    </div>`;
  document.getElementById('modal-preset').classList.add('open');
}
window.openPresetModal = openPresetModal;

async function handleSelectPreset(id){
  await sillytavernStore.updateSettings({ activePresetId: id });
  await sillytavernStore.loadAll();
  closeModal('modal-preset');
  showToast('已切换预设','success');
}
window.handleSelectPreset = handleSelectPreset;

async function handleDeletePreset(id){
  const st = sillytavernStore;
  if(st.presets.length<=1){showToast('至少保留一个预设','warning');return;}
  showConfirm('确定删除此预设？',async()=>{
    await st.deletePreset(id);
    await st.loadAll();
    closeModal('modal-preset');
    openPresetModal();
    showToast('预设已删除','info');
  });
}
window.handleDeletePreset = handleDeletePreset;

async function handleCreatePreset(){
  const preset = createDefaultPreset();
  const np = { ...preset, id: crypto.randomUUID(), createdAt: Date.now(), updatedAt: Date.now() };
  await sillytavernStore.savePreset(np);
  await sillytavernStore.loadAll();
  closeModal('modal-preset');
  openPresetModal();
  showToast('已创建新预设','success');
}
window.handleCreatePreset = handleCreatePreset;

// ==================== MODAL UTILS ====================
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
window.closeModal = closeModal;

// ==================== TOASTS ====================
function showToast(message, type='info'){
  const container = document.getElementById('toast-container');
  const id = 'toast-'+Date.now();
  const iconMap = {
    success: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>',
    info: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',
    warning: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>'
  };
  const toast = document.createElement('div');
  toast.className = 'toast'; toast.id = id;
  toast.innerHTML = `<div class="toast-icon ${type}">${iconMap[type]}</div><div class="toast-message">${message}</div><button class="toast-close" onclick="document.getElementById('${id}').classList.remove('visible');setTimeout(()=>document.getElementById('${id}')?.remove(),400)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`;
  container.appendChild(toast);
  requestAnimationFrame(()=>toast.classList.add('visible'));
  setTimeout(()=>{ toast.classList.remove('visible'); setTimeout(()=>toast.remove(),400); },3500);
}
window.showToast = showToast;

// ==================== CONFIRM ====================
let confirmCallback = null;
function showConfirm(message, callback){
  document.getElementById('confirm-message').textContent = message;
  document.getElementById('confirm-action').onclick = ()=>{ hideConfirm(); if(callback) callback(); };
  document.getElementById('confirm-dialog').classList.add('open');
}
function hideConfirm(){ document.getElementById('confirm-dialog').classList.remove('open'); }
window.hideConfirm = hideConfirm;
window.showConfirm = showConfirm;

// ==================== INIT ====================
async function initApp(){
  try {
    await initializeDatabase();
    await sillytavernStore.loadAll();
    storeReady = true;

    if(!sillytavernStore.settings){
      await saveSettings(DEFAULT_SETTINGS);
      await sillytavernStore.loadAll();
    }

    renderStory();
    renderCharacters();
    refreshGameUI();
    updateTimeDisplay();

    document.querySelectorAll('.modal-overlay').forEach(o=>{ o.addEventListener('click',function(e){ if(e.target===this) this.classList.remove('open'); }); });
    document.getElementById('confirm-dialog').addEventListener('click',function(e){ if(e.target===this) this.classList.remove('open'); });
    document.addEventListener('keydown',function(e){ if(e.key==='Escape') document.querySelectorAll('.modal-overlay.open, .confirm-overlay.open').forEach(m=>m.classList.remove('open')); });
    document.querySelectorAll('.nav-link').forEach(l=>{ l.addEventListener('click',function(){ navigateTo(this.dataset.page); }); });
  } catch(e) {
    document.body.insertAdjacentHTML('beforeend',
      `<div style="position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;background:rgba(255,80,80,0.2);border:1px solid rgba(255,80,80,0.4);border-radius:12px;padding:16px 24px;max-width:500px;text-align:center;font-size:0.85rem;color:#ffb0b0;">系统初始化失败：${e.message}<br><span style="font-size:0.75rem;color:#ff8080;">请打开浏览器控制台 (F12) 查看详细错误</span></div>`);
    console.error('App init error:', e);
  }
}

function updateTimeDisplay(){
  const h = new Date().getHours();
  let label = '午前';
  if(h>=12&&h<17) label='午后';
  else if(h>=17&&h<20) label='黄昏';
  else if(h>=20||h<5) label='夜间';
  document.getElementById('time-display').textContent = `第 1 天 · ${label}`;
}

try {
  initApp();
  initParticles();
} catch(e) {
  console.error('Module init error:', e);
}
</script>
