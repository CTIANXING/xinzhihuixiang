<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心之回响 — Heart's Echo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep:#08081a;--bg-glass:rgba(20,16,40,0.85);--bg-glass-hover:rgba(30,24,55,0.92);
  --border-glass:rgba(255,255,255,0.08);--border-glow:rgba(255,107,157,0.25);
  --accent-pink:#ff6b9d;--accent-pink-soft:#ff8fb3;--accent-lavender:#b388ff;--accent-gold:#f0c060;--accent-cyan:#64d8d8;
  --text-primary:#f0e6ff;--text-secondary:#b0a0cc;--text-muted:#6e6088;
  --shadow-glow:0 0 40px rgba(255,107,157,0.15);--shadow-card:0 8px 32px rgba(0,0,0,0.3);
  --radius-sm:8px;--radius-md:14px;--radius-lg:20px;--radius-xl:28px;
  --transition-fast:0.2s cubic-bezier(0.4,0,0.2,1);--transition-smooth:0.4s cubic-bezier(0.4,0,0.2,1);--transition-spring:0.5s cubic-bezier(0.34,1.56,0.64,1);
  --font-serif:'Noto Serif SC',serif;--font-sans:'Noto Sans SC',system-ui,sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--font-sans);background:var(--bg-deep);color:var(--text-primary);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 20%,rgba(255,107,157,0.06)0%,transparent 60%),radial-gradient(ellipse 60% 70% at 80% 70%,rgba(179,136,255,0.05)0%,transparent 60%),radial-gradient(ellipse 50% 50% at 50% 50%,rgba(100,216,216,0.03)0%,transparent 60%);pointer-events:none;z-index:0}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,107,157,0.3);border-radius:3px}
#particles-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
#app-shell{position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:0 24px;min-height:100vh;display:flex;flex-direction:column}
.top-nav{display:flex;align-items:center;justify-content:space-between;padding:16px 0;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(8,8,26,0.7);border-bottom:1px solid var(--border-glass);gap:10px}
.nav-brand{font-family:var(--font-serif);font-size:1.35rem;font-weight:700;background:linear-gradient(135deg,var(--accent-pink),var(--accent-lavender));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:0.06em;cursor:pointer;user-select:none}
.nav-links{display:flex;gap:3px;background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:var(--radius-lg);padding:3px;flex:1;justify-content:center}
.nav-link{display:flex;align-items:center;gap:5px;font-family:var(--font-sans);font-size:0.83rem;font-weight:500;color:var(--text-secondary);background:transparent;border:none;border-radius:var(--radius-md);padding:8px 14px;cursor:pointer;transition:all var(--transition-fast);white-space:nowrap}
.nav-link:hover{color:var(--text-primary);background:rgba(255,255,255,0.06)}
.nav-link.active{color:var(--text-primary);background:linear-gradient(135deg,rgba(255,107,157,0.2),rgba(179,136,255,0.15));box-shadow:0 0 20px rgba(255,107,157,0.1)}
.nav-link.highlight{border:1px solid rgba(255,107,157,0.3)}
.nav-link svg{width:15px;height:15px;flex-shrink:0}
.nav-actions{display:flex;gap:6px;align-items:center}
.nav-icon-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border-glass);background:var(--bg-glass);color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition-fast)}
.nav-icon-btn:hover{color:var(--text-primary);border-color:var(--border-glow)}
.nav-icon-btn svg{width:17px;height:17px}
#page-container{flex:1;position:relative;padding:20px 0 60px}
.page{display:none;animation:pageIn 0.4s cubic-bezier(0.4,0,0.2,1)}
.page.active{display:block}
@keyframes pageIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ===== HOME ===== */
.home-layout{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:10px}
.home-left{display:flex;flex-direction:column;gap:20px}
.home-status-card{background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:var(--radius-xl);padding:28px}
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.status-item{background:rgba(255,255,255,0.03);border-radius:var(--radius-sm);padding:14px 16px}
.status-label{font-size:0.72rem;color:var(--text-muted);margin-bottom:4px;letter-spacing:0.04em}
.status-value{font-family:var(--font-serif);font-size:1.15rem;font-weight:700}
.status-value.highlight{color:var(--accent-pink)}
.day-badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,rgba(255,107,157,0.2),rgba(240,192,96,0.12));border:1px solid rgba(255,107,157,0.2);border-radius:var(--radius-md);padding:6px 14px;font-size:0.82rem;font-weight:600;margin-top:6px}
.affection-gauge{margin-top:16px}
.affection-bar-wrap{width:100%;height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;margin:8px 0}
.affection-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent-pink),var(--accent-gold));transition:width 1s cubic-bezier(0.4,0,0.2,1)}
.affection-meta{display:flex;justify-content:space-between;font-size:0.76rem;color:var(--text-muted)}
.affection-ladder{display:flex;gap:2px;margin-top:6px}
.ladder-step{flex:1;text-align:center;font-size:0.65rem;color:var(--text-muted);padding:4px 2px;border-radius:4px;transition:all var(--transition-fast)}
.ladder-step.active{background:rgba(255,107,157,0.2);color:var(--accent-pink-soft);font-weight:600}
.home-right{display:flex;flex-direction:column;gap:14px}
.home-action-card{background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:var(--radius-xl);padding:24px;text-align:center;cursor:pointer;transition:all var(--transition-smooth)}
.home-action-card:hover{border-color:var(--border-glow);transform:translateY(-2px);box-shadow:var(--shadow-glow)}
.home-action-card h3{font-family:var(--font-serif);font-size:1.2rem;margin-bottom:8px}
.home-action-card p{font-size:0.82rem;color:var(--text-secondary);line-height:1.6}
.home-action-card.primary{background:linear-gradient(135deg,rgba(255,107,157,0.15),rgba(179,136,255,0.08));border-color:rgba(255,107,157,0.25)}
.hero-title{font-family:var(--font-serif);font-size:2.6rem;font-weight:900;background:linear-gradient(135deg,#ff6b9d 0%,#f0c060 30%,#b388ff 60%,#64d8d8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:0.1em;text-align:center;margin-bottom:4px;animation:titleShimmer 4s ease-in-out infinite;background-size:200% 200%}
@keyframes titleShimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.hero-subtitle{text-align:center;font-family:var(--font-serif);font-size:0.9rem;color:var(--text-secondary);letter-spacing:0.12em;margin-bottom:24px}

/* ===== MAP ===== */
.map-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.map-title{font-family:var(--font-serif);font-size:1.4rem;font-weight:700;display:flex;align-items:center;gap:8px}
.map-title svg{width:22px;height:22px;color:var(--accent-pink)}
.map-hint{font-size:0.8rem;color:var(--text-muted);margin-top:4px}
.map-grid{display:grid;gap:14px;padding:8px}
.map-grid.size-2{grid-template-columns:repeat(2,1fr)}.map-grid.size-3{grid-template-columns:repeat(3,1fr)}.map-grid.size-4{grid-template-columns:repeat(4,1fr)}
.map-cell{aspect-ratio:1;min-height:170px;background:var(--bg-glass);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--border-glass);border-radius:var(--radius-lg);padding:18px;cursor:pointer;transition:all var(--transition-smooth);display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
.map-cell:hover{transform:translateY(-3px) scale(1.02);border-color:var(--border-glow);box-shadow:var(--shadow-glow);z-index:2}
.map-cell.selected{border-color:var(--accent-pink);border-width:2px;box-shadow:0 0 30px rgba(255,107,157,0.2)}
.map-cell.selected::before{content:'已选';position:absolute;top:10px;right:10px;background:rgba(255,107,157,0.3);color:var(--accent-pink-soft);font-size:0.7rem;font-weight:700;padding:3px 10px;border-radius:10px;z-index:2}
.map-cell.occupied{border-color:rgba(255,107,157,0.2)}
.location-name{font-family:var(--font-serif);font-size:1.1rem;font-weight:700;margin-bottom:4px}
.location-desc{font-size:0.76rem;color:var(--text-secondary);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.location-chars{display:flex;gap:5px;margin-top:8px}
.char-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:700;border:2px solid var(--border-glass)}
.char-dot.male{background:rgba(100,216,216,0.25);color:var(--accent-cyan)}.char-dot.female{background:rgba(255,107,157,0.25);color:var(--accent-pink)}

/* ===== DIARY ===== */
.diary-header{margin-bottom:20px}.diary-title{font-family:var(--font-serif);font-size:1.4rem;font-weight:700;display:flex;align-items:center;gap:8px}.diary-title svg{width:22px;height:22px;color:var(--accent-gold)}
.diary-entries{display:flex;flex-direction:column;gap:12px}
.diary-entry{background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:var(--radius-lg);padding:18px 20px;transition:all var(--transition-fast)}
.diary-entry:hover{border-color:var(--border-glow)}
.diary-entry-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.diary-day{font-family:var(--font-serif);font-size:0.95rem;font-weight:700;color:var(--accent-gold)}
.diary-location{font-size:0.78rem;color:var(--text-muted)}
.diary-summary{font-size:0.85rem;color:var(--text-secondary);line-height:1.7}
.diary-affection{font-size:0.76rem;color:var(--accent-pink-soft);margin-top:8px}
.diary-empty{text-align:center;padding:60px 20px;color:var(--text-muted)}
.diary-empty svg{width:48px;height:48px;margin-bottom:12px;opacity:0.3}
.diary-event{border-color:rgba(255,107,157,0.3);background:rgba(255,107,157,0.05)}
.diary-event .diary-day{color:var(--accent-pink)}

/* ===== CHARACTERS ===== */
.chars-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
.char-card{background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:var(--radius-xl);padding:24px;position:relative;overflow:hidden}
.char-card:hover{border-color:var(--border-glow)}
.char-card-top{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.char-avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.3rem;font-weight:700;border:2px solid var(--border-glass)}
.char-avatar.male{background:rgba(100,216,216,0.2)}.char-avatar.female{background:rgba(255,107,157,0.2)}
.char-name{font-family:var(--font-serif);font-size:1.2rem;font-weight:700}.char-role{font-size:0.76rem;color:var(--text-muted);margin-top:2px}
.char-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.82rem}
.char-row-label{color:var(--text-muted)}.char-row-value{font-weight:500}
.char-affection-bar{width:100%;height:5px;background:rgba(255,255,255,0.06);border-radius:3px;margin:12px 0 6px;overflow:hidden}
.char-affection-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent-pink),var(--accent-gold));transition:width 1.2s cubic-bezier(0.4,0,0.2,1)}
.char-affection-num{display:flex;justify-content:space-between;font-size:0.73rem;color:var(--text-muted);margin-bottom:8px}

/* ===== GAME PAGE ===== */
.game-layout{display:grid;grid-template-columns:1fr 300px;gap:18px;height:calc(100vh - 150px);min-height:550px}
.game-main{display:flex;flex-direction:column;background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:var(--radius-xl);overflow:hidden}
.game-scene-header{padding:14px 20px;border-bottom:1px solid var(--border-glass);display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.02)}
.game-scene-title{font-family:var(--font-serif);font-size:1rem;font-weight:600;display:flex;align-items:center;gap:6px}
.game-scene-title svg{width:16px;height:16px;color:var(--accent-gold)}
.game-day-info{font-size:0.76rem;color:var(--text-muted);display:flex;align-items:center;gap:10px}
.game-msg-counter{font-size:0.72rem;color:var(--text-muted)}
.game-msg-counter.warning{color:var(--accent-gold)}
.game-text-area{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:14px}
.game-msg{animation:msgIn 0.35s cubic-bezier(0.4,0,0.2,1);padding:14px 18px;border-radius:var(--radius-md);line-height:1.85;font-size:0.92rem;position:relative}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.game-msg.user{align-self:flex-end;max-width:72%;background:linear-gradient(135deg,rgba(100,216,216,0.15),rgba(100,180,216,0.08));border:1px solid rgba(100,216,216,0.2);color:var(--text-primary)}
.game-msg.assistant{align-self:flex-start;max-width:88%;background:rgba(255,255,255,0.03);border:1px solid var(--border-glass)}
.game-msg .msg-role{font-size:0.7rem;font-weight:600;color:var(--accent-pink);margin-bottom:4px;letter-spacing:0.04em}
.game-msg .msg-thinking-toggle{font-size:0.76rem;color:var(--accent-lavender);cursor:pointer;padding:5px 10px;background:rgba(179,136,255,0.08);border-radius:var(--radius-sm);display:inline-block;margin-top:6px;transition:all var(--transition-fast)}
.game-msg .msg-thinking-toggle:hover{background:rgba(179,136,255,0.15)}
.game-msg .msg-thinking-content{margin-top:6px;padding:10px 14px;background:rgba(179,136,255,0.06);border-left:2px solid var(--accent-lavender);border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-size:0.8rem;color:var(--text-secondary);line-height:1.65;display:none}
.game-msg .msg-thinking-content.open{display:block}
.game-options-area{padding:14px 20px;border-top:1px solid var(--border-glass);display:flex;flex-wrap:wrap;gap:8px;background:rgba(255,255,255,0.02)}
.game-option-btn{font-family:var(--font-sans);font-size:0.82rem;font-weight:500;padding:9px 18px;border-radius:var(--radius-md);cursor:pointer;transition:all var(--transition-fast);border:1px solid var(--border-glass);background:var(--bg-glass);color:var(--text-primary);position:relative;overflow:hidden}
.game-option-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,107,157,0.2),rgba(179,136,255,0.1));opacity:0;transition:opacity var(--transition-fast)}
.game-option-btn:hover::before{opacity:1}.game-option-btn:hover{border-color:var(--border-glow);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.25)}
.game-input-area{padding:12px 20px;border-top:1px solid var(--border-glass);display:flex;gap:8px;align-items:center;background:rgba(0,0,0,0.2)}
.game-input{flex:1;font-family:var(--font-sans);font-size:0.86rem;color:var(--text-primary);background:rgba(255,255,255,0.05);border:1px solid var(--border-glass);border-radius:var(--radius-sm);padding:10px 14px;outline:none;transition:all var(--transition-fast)}
.game-input:focus{border-color:var(--accent-lavender);box-shadow:0 0 0 3px rgba(179,136,255,0.08)}
.game-send-btn{font-family:var(--font-sans);font-size:0.83rem;font-weight:600;padding:10px 18px;border-radius:var(--radius-sm);cursor:pointer;transition:all var(--transition-fast);white-space:nowrap;border:none;background:linear-gradient(135deg,var(--accent-pink),var(--accent-lavender));color:#fff}
.game-send-btn:hover{opacity:0.9;transform:translateY(-1px);box-shadow:0 4px 16px rgba(255,107,157,0.3)}
.game-send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.game-send-btn.end{background:linear-gradient(135deg,rgba(240,192,96,0.8),rgba(255,140,80,0.8));font-size:0.78rem}
.game-send-btn.end:hover{box-shadow:0 4px 16px rgba(240,192,96,0.3)}
.game-sidebar{display:flex;flex-direction:column;gap:12px}
.sidebar-panel{background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:var(--radius-lg);padding:16px}
.sidebar-panel-title{font-family:var(--font-serif);font-size:0.8rem;font-weight:700;color:var(--text-secondary);margin-bottom:10px;letter-spacing:0.03em;display:flex;align-items:center;gap:5px}
.sidebar-panel-title svg{width:14px;height:14px}
.var-list{display:flex;flex-direction:column;gap:5px}.var-row{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;background:rgba(255,255,255,0.03);border-radius:var(--radius-sm);font-size:0.78rem}.var-name{color:var(--text-muted)}.var-value{font-weight:600}
.sum-text{font-size:0.8rem;color:var(--text-secondary);line-height:1.6}
.chat-session-list{display:flex;flex-direction:column;gap:3px;max-height:180px;overflow-y:auto}
.chat-session-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:var(--radius-sm);font-size:0.78rem;cursor:pointer;transition:all var(--transition-fast);background:transparent}
.chat-session-item:hover{background:rgba(255,255,255,0.04)}.chat-session-item.active{background:rgba(255,107,157,0.12);color:var(--accent-pink)}
.chat-session-item .session-del-btn{width:20px;height:20px;border-radius:50%;border:none;background:transparent;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:all var(--transition-fast)}
.chat-session-item:hover .session-del-btn{opacity:1}.chat-session-item .session-del-btn:hover{background:rgba(255,80,80,0.2);color:#ff5050}

/* ===== MODALS ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity var(--transition-smooth)}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal-panel{background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:var(--radius-xl);max-width:580px;width:92%;max-height:85vh;overflow-y:auto;transform:translateY(20px) scale(0.96);transition:transform var(--transition-spring);box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.modal-panel.wide{max-width:760px}
.modal-overlay.open .modal-panel{transform:translateY(0) scale(1)}
.modal-header{padding:22px 22px 0;display:flex;align-items:flex-start;justify-content:space-between}
.modal-title{font-family:var(--font-serif);font-size:1.3rem;font-weight:700}.modal-subtitle{font-size:0.78rem;color:var(--text-muted);margin-top:3px}
.modal-close{width:32px;height:32px;border-radius:50%;border:1px solid var(--border-glass);background:transparent;color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition-fast);flex-shrink:0}
.modal-close:hover{background:rgba(255,255,255,0.08);color:var(--text-primary)}
.modal-body{padding:18px 22px 22px}
.modal-env-desc{font-size:0.86rem;color:var(--text-secondary);line-height:1.8;margin-bottom:18px;padding:16px;background:rgba(255,255,255,0.03);border-radius:var(--radius-md);border-left:2px solid var(--accent-lavender)}
.modal-section-title{font-family:var(--font-serif);font-size:0.82rem;font-weight:700;color:var(--text-secondary);margin-bottom:10px}
.modal-chars-list{display:flex;flex-direction:column;gap:8px;margin-bottom:18px}
.modal-char-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,0.03);border-radius:var(--radius-sm)}
.modal-char-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:0.85rem;font-weight:700}
.modal-char-avatar.male{background:rgba(100,216,216,0.2);color:var(--accent-cyan)}.modal-char-avatar.female{background:rgba(255,107,157,0.2);color:var(--accent-pink)}
.modal-char-name{font-weight:600;font-size:0.85rem}.modal-char-status{font-size:0.74rem;color:var(--text-muted);margin-top:1px}

async function saveToSlot(slotIndex, customName){
  try{
    const snap=await makeStateSnapshot();

      customName=prompt('存档名称（留空使用默认）：',`存档 ${slotIndex}`);
    }
    const slot={
      index:slotIndex,
      name:slotIndex===0?'自动存档':(customName||`存档 ${slotIndex}`),
      timestamp:Date.now(),
      day:currentDay,
      month:getMonth(),
      location:loc?.name||'',
      affection:gameCharacters[1].affection,
      playerRole,
      summary:diaryEntries.length>0?diaryEntries[diaryEntries.length-1].summary:'新游戏',
      data:snap,
    };
    const st=sillytavernStore;
    await st.loadAll();
    const allSlots=st.settings?.saveSlots?JSON.parse(st.settings.saveSlots):[];

function getAffectionLabel(val){
  if(val===undefined||val===null) val=gameCharacters[1].affection;
  for(const l of AFFECTION_LADDER){if(val>=l.min&&val<=l.max)return l}
  return AFFECTION_LADDER[0];
}
function checkMilestone(oldVal,newVal){
  const oldL=AFFECTION_LADDER.findIndex(l=>oldVal>=l.min&&oldVal<=l.max);
  const newL=AFFECTION_LADDER.findIndex(l=>newVal>=l.min&&newVal<=l.max);
  return newL>oldL?AFFECTION_LADDER[newL]:null;
}

function sanitizeVarsJson(raw){
  if(!raw||!raw.trim())return raw;
  let s=raw.trim();
  s=s.replace(/"\s*:\s*\+\s*(\d)/g,'":$1'); // "好感度": +5 → "好感度":5
  s=s.replace(/:\s*\+(\d)/g,':$1'); // : +5 → :5
  return s;
}

// ==================== PARTICLES ====================
function initParticles(){
  const canvas=document.getElementById('particles-canvas'),ctx=canvas.getContext('2d');
  let particles=[];
  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  class P{constructor(){this.reset();this.y=Math.random()*canvas.height}
    reset(){this.x=Math.random()*canvas.width;this.y=-10;this.size=Math.random()*2.5+1;this.speedY=Math.random()*0.4+0.15;this.speedX=(Math.random()-0.5)*0.3;this.opacity=Math.random()*0.35+0.08;this.wobble=Math.random()*Math.PI*2;this.wobbleSpeed=Math.random()*0.015+0.005}
    update(){this.wobble+=this.wobbleSpeed;this.x+=this.speedX+Math.sin(this.wobble)*0.2;this.y+=this.speedY;if(this.y>canvas.height+10)this.reset();if(this.x<-10)this.x=canvas.width+10;if(this.x>canvas.width+10)this.x=-10}
    draw(c){c.beginPath();c.arc(this.x,this.y,this.size,0,Math.PI*2);c.fillStyle=`rgba(255,182,193,${this.opacity})`;c.fill()}}
  for(let i=0;i<50;i++)particles.push(new P());
  (function a(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw(ctx)});requestAnimationFrame(a)})();
}

    }

    // Save comprehensive diary
    const oldAff=gameCharacters[1].affection;

    diaryEntries.push({day:currentDay,month,location:todayLocation?.name||'未知',summary:summaryText,affectionChange:finalAffChange,isEvent:!!evt});

      showToast(`关系变化：「${milestone.label}」`,'success');
    }

    // Memory system: auto-create lorebook entry for this day
    try{
      let keywords=[];
      const kwMatch=rawReply.match(/<keywords>(.*?)<\/keywords>/s);
      if(kwMatch){keywords=kwMatch[1].trim().split(/\s+/).filter(k=>k&&k.length>0);}
      if(keywords.length===0){
        // Fallback: extract from summary
        const stopWords=['的','了','在','是','我','你','他','她','它','们','这','那','和','与','或','而','但','不','就','也','都','很','会','有','个','到','去','说','看','想','要','能','被','把','着','过','对','从','以','之','为','上','下','中','里','外','前','后','左','右','大','小','多','少','来','还','没有','已经','可以','一个','自己','什么','怎么','这个','那个','今天','因为','所以','如果','虽然','但是','然后','不过','并且','而且','开始','继续','觉得','知道','感觉','希望','决定','选择','发现','注意','突然','慢慢','轻轻','微微','似乎','仿佛','好像','一样','一起','一直','只是','一点','一些'];

        let memBook=st2.lorebooks.find(b=>b.name==='日记记忆');

          memBook={...createDefaultLorebook('日记记忆'),description:'自动生成的每日记忆条目',entries:[],id:crypto.randomUUID(),createdAt:Date.now(),updatedAt:Date.now()};
          await saveLorebook(memBook);
        }
        memBook.entries.push({
          ...createDefaultEntry(),
          id:crypto.randomUUID(),
          comment:`第${currentDay}天·${month} ${todayLocation?.name||''}`,
          keys:keywords,
          content:summaryText,
          order:currentDay*10,
        });
        memBook.updatedAt=Date.now();
        await saveLorebook(memBook);
        // Ensure activated
        const activeIds=st2.activeLorebookIds||[];
        if(!activeIds.includes(memBook.id)){
          await st2.updateSettings({activeLorebookIds:[...activeIds,memBook.id]});
        }
        await st2.loadAll();
      }
    }catch(e){console.warn('Memory creation failed:',e);}

    // Advance day
    currentDay++;
    if(currentDay>8){
      const totalAff=gameCharacters[1].affection;
      let ending='';
      if(totalAff>=95)ending='恋人结局 — 海棠树下的告白';
      else if(totalAff>=70)ending='好友结局 — 各自珍重但不会忘记';

      showToast(`游戏结束 — ${ending}`,'success');
      currentDay=8; // Cap at day 8
    }

    todayLocation=null;
    dayStarted=false;
    messagesToday=0;
    currentRound=0;
    roundHistory=[];
    affectionGainedToday=0;
    document.getElementById('game-msg-counter').textContent='0/'+MAX_MESSAGES_PER_DAY;
    document.getElementById('round-history').innerHTML='';
    document.getElementById('round-label').textContent='第 0 回合';
    document.getElementById('game-scene-label').textContent='今日已结束';
    document.getElementById('var-list').innerHTML='<div style="font-size:0.76rem;color:var(--text-muted);">暂无变量</div>';
    document.getElementById('sum-text').textContent='今日已结算，可进入下一天';
    document.getElementById('game-options-area').innerHTML='';
    document.getElementById('game-text-area').innerHTML=`<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5 3 19 12 5 21 5 3"/></svg><p>今日剧情已结束<br>「${summaryText}」<br>前往主页开始新的一天</p></div>`;

    renderHome();renderDiary();renderCharacters();
    saveGameState();
    saveToSlot(0); // auto-save

    if(milestone)showToast(`关系变化：${milestone.label}`, 'success');
    if(evt)showToast(`关键事件：${evt.name}`, 'info');

  }catch(e){showToast('日结失败: '+e.message,'warning');}
  finally{
    document.getElementById('game-loading').style.display='none';
    document.getElementById('game-input').disabled=false;
    document.getElementById('game-send-btn').disabled=false;
  }
}

    const rawVarsMatch=rawReply.match(/<vars>([\s\S]*?)<\/vars>/i);

function renderGameVars(vars, sum){
  const container=document.getElementById('var-list');
  const entries=Object.entries(vars||{}).filter(([k])=>k!=='好感度');
  const aff=vars?.['好感度'];
  if(aff!==undefined&&aff!==0){
    const sign=aff>0?'+':'';
    const affText=`${sign}${aff} (总计 ${gameCharacters[1].affection})`;
    entries.unshift(['好感度变化',affText]);
  }
  if(entries.length===0){container.innerHTML='<div style="font-size:0.76rem;color:var(--text-muted);">暂无变量</div>';}
  else{container.innerHTML=entries.map(([k,v])=>`<div class="var-row"><span class="var-name">${escapeHtml(k)}</span><span class="var-value">${escapeHtml(String(v))}</span></div>`).join('');}
  if(sum)document.getElementById('sum-text').textContent=sum;
  document.getElementById('round-label').textContent=`第 ${currentRound} 回合`;
}

function addRoundRecord(userMsg,maintext,thinking,sum,vars){
  roundHistory.push({round:currentRound,userMsg,maintext:maintext?.slice(0,80),thinking:thinking?.slice(0,80),sum:sum||'',variables:{...vars}});
  const container=document.getElementById('round-history');
  container.innerHTML=roundHistory.map((r,i)=>`<div class="var-row" style="cursor:pointer;padding:6px 8px;" onclick="showRoundDetail(${i})" id="rh-${i}"><span style="font-size:0.73rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;">#${r.round} ${escapeHtml(r.sum||r.userMsg?.slice(0,20)||'回合')}</span></div>`).join('');
}

function showRoundDetail(idx){
  const r=roundHistory[idx];
  if(!r)return;
  renderGameVars(r.variables,r.sum||'');
  document.getElementById('round-label').textContent=`第 ${r.round} 回合 (历史)`;
}

  if(!dayStarted){showToast('今天尚未开始','warning');return;}
  showConfirm('跳过今天？将使用当前对话内容直接生成日结摘要。',async()=>{
    dayStarted=true;
    await endCurrentDay();
  });
}

function refreshGameUI(){
  const st=sillytavernStore;
  document.getElementById('game-day-label').textContent=`第${currentDay}天·${getMonth()}`;
  document.getElementById('game-scene-label').textContent=todayLocation?todayLocation.name:(dayStarted?'进行中':'未开始');
  document.getElementById('game-msg-counter').textContent=`${messagesToday}/${MAX_MESSAGES_PER_DAY}`;
  // Render chat messages from active session
  const activeChat=st.activeChat;
  if(activeChat&&activeChat.messages.length>0){
    const area=document.getElementById('game-text-area');
    const existingIds=new Set();
    area.querySelectorAll('.game-msg').forEach(el=>{if(el.id)existingIds.add(el.id);});
    for(const msg of activeChat.messages.slice(-20)){
      const renderedId='gm-rendered-'+msg.id;
      if(!existingIds.has(renderedId)){
        const role=msg.role;
        const parsed=msg.parsed;
        if(parsed&&parsed.maintext){
          appendGameMessage(role,parsed.maintext,{thinking:parsed.thinking||''});
        }else{
          appendGameMessage(role,msg.content.slice(0,800),null);
        }
        const last=area.lastElementChild;
        if(last)last.id=renderedId;
      }
    }
    if(activeChat.variables)renderGameVars(activeChat.variables,activeChat.messages[activeChat.messages.length-1]?.parsed?.sum||'');
  }
}
window.refreshGameUI=refreshGameUI;

window.openBackupModal=openBackupModal;

async function exportBackup(){
  try{
    const backup=await exportAllData();
    const gs={currentDay,todayLocation:todayLocation?.id||null,dayStarted,messagesToday,currentRound,affection:gameCharacters[1].affection,previousAffection,affectionGainedToday,diaryEntries,playerRole,dailyAffectionCap,exportedAt:Date.now(),version:'1.0'};
    backup.gameState=gs;
    // Also embed in settings for redundancy
    if(backup.settings&&backup.settings.length>0){
      backup.settings[0].gameState_snapshot=JSON.stringify(gs);
    }
    const json=JSON.stringify(backup,null,2);
    const blob=new Blob([json],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`xinzhihuixiang-backup-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);a.click();
    document.body.removeChild(a);URL.revokeObjectURL(url);
    showToast('备份已导出','success');
  }catch(e){showToast('导出失败: '+e.message,'warning');}
}
window.exportBackup=exportBackup;

function triggerImportBackup(){
  document.getElementById('global-backup-input').click();
}
window.triggerImportBackup=triggerImportBackup;

async function handleImportBackup(event){
  const file=event.target.files?.[0];
  if(!file)return;
  try{
    const text=await file.text();
    const backup=JSON.parse(text);
    showConfirm('导入备份将覆盖当前所有数据（设置、预设、世界书、会话、日记、进度）。确定继续？',async()=>{
      try{
        await importAllData(backup);
        // Restore game state - prefer explicit property, fall back to settings snapshot
        let gs=backup.gameState;
        if(!gs&&backup.settings&&backup.settings[0]?.gameState_snapshot){
          gs=JSON.parse(backup.settings[0].gameState_snapshot);
        }
      if(gs){
        currentDay=gs.currentDay||1;
        todayLocation=gs.todayLocation?Locations.find(l=>l.id===gs.todayLocation)||null:null;
        gameCharacters[1].affection=gs.affection||10;previousAffection=gs.previousAffection||10;
        affectionGainedToday=gs.affectionGainedToday||0;diaryEntries=gs.diaryEntries||[];
        dailyAffectionCap=gs.dailyAffectionCap||DEFAULT_DAILY_AFFECTION_CAP;
        playerRole=gs.playerRole||'male';
        roundHistory=[];
      }
      await sillytavernStore.loadAll();
      if(sillytavernStore.chats.length>0&&!sillytavernStore.activeChatId){
        sillytavernStore.loadChat(sillytavernStore.chats[sillytavernStore.chats.length-1].id);
      }
      if(sillytavernStore.activeChat&&sillytavernStore.activeChat.messages.length>0){
        dayStarted=true;messagesToday=sillytavernStore.activeChat.messages.filter(m=>m.role==='user').length;currentRound=Math.ceil(sillytavernStore.activeChat.messages.length/2);
      }else{dayStarted=false;messagesToday=0;currentRound=0;}
        saveGameState();
        justLoaded=true;
        closeModal('modal-backup');
        renderHome();renderDiary();renderCharacters();
        document.getElementById('home-role-title').textContent=`当前扮演：${getUserName()}`;
        document.getElementById('home-role-desc').textContent=`对方角色为${getCharName()}`;
        showToast('备份已恢复，数据已同步','success');
      }catch(e){showToast('恢复失败: '+e.message,'warning');}
    });
  }catch(e){showToast('文件读取失败: '+e.message,'warning');}
  event.target.value='';
}
window.handleImportBackup=handleImportBackup;

// ==================== MODAL UTILS ====================
function closeModal(id){document.getElementById(id).classList.remove('open');}
window.closeModal=closeModal;

// ==================== TOASTS ====================
function showToast(message,type='info'){
  const container=document.getElementById('toast-container');
  const id='toast-'+Date.now();
  const icons={success:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>',info:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',warning:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>'};
  const toast=document.createElement('div');toast.className='toast';toast.id=id;
  toast.innerHTML=`<div class="toast-icon ${type}">${icons[type]}</div><div class="toast-message">${message}</div><button class="toast-close" onclick="document.getElementById('${id}').classList.remove('visible');setTimeout(()=>document.getElementById('${id}')?.remove(),400)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`;
  container.appendChild(toast);
  requestAnimationFrame(()=>toast.classList.add('visible'));
  setTimeout(()=>{toast.classList.remove('visible');setTimeout(()=>toast.remove(),400);},3500);
}
window.showToast=showToast;

function showConfirm(message,callback){
  document.getElementById('confirm-message').textContent=message;
  document.getElementById('confirm-action').onclick=()=>{hideConfirm();if(callback)callback();};
  document.getElementById('confirm-dialog').classList.add('open');
}
function hideConfirm(){document.getElementById('confirm-dialog').classList.remove('open');}
window.hideConfirm=hideConfirm;window.showConfirm=showConfirm;

async function initApp(){
  try{
    await initializeDatabase();
    await sillytavernStore.loadAll();
    storeReady=true;

    if(!sillytavernStore.settings){
      const gameSettings={...DEFAULT_SETTINGS,userName:'林澈',characterName:'苏晚晴',uiMode:'game',

      };
      await saveSettings(gameSettings);
      await sillytavernStore.loadAll();
    }
    const st=sillytavernStore;
    if(st.settings&&(st.settings.characterName==='AI'||st.settings.userName==='用户')){
      await st.updateSettings({userName:'林澈',characterName:'苏晚晴'});
      await st.loadAll();

    // Patch empty API fields with DeepSeek defaults
    if(st.settings&&(!st.settings.api?.baseUrl||st.settings.api?.baseUrl.includes('openai'))){
      await st.updateSettings({api:{...st.settings.api,baseUrl:'https://api.deepseek.com/v1',apiKey:'sk-ccac68b644c6409d9f70ce00fa5424f7',model:'deepseek-v4-pro',timeout:120000,secondary:st.settings.api?.secondary||{enabled:false,baseUrl:'',apiKey:'',model:''}}});
      await st.loadAll();
    }
    if(st.settings&&!st.settings.narrativeStyle){
      await st.updateSettings({narrativeStyle:'balanced'});
      await st.loadAll();
    }

    // Optimize default preset for DeepSeek
    if(st.presets.length>0&&st.presets[0].name==='默认预设'){
      const dp=st.presets[0];
      const needsUpdate=!dp.settings.openai_max_context||dp.settings.openai_max_context<200000||dp.settings.temp_openai<0.9||!dp.settings.main||dp.settings.main.length<20;
      if(needsUpdate){
        dp.settings={...dp.settings,
          openai_max_context:200000,openai_max_tokens:4096,
          temp_openai:1.0,top_p_openai:0.95,
          freq_pen_openai:0,pres_pen_openai:0,
          stream_openai:false,
          main:DEFAULT_SYSTEM_PROMPT,
        };
        dp.updatedAt=Date.now();
        await savePreset(dp);await st.loadAll();
      }
    }

    // Ensure world lorebook exists
    const hasWorldBook=st.lorebooks.some(b=>b.name==='心之回响·世界观');
    if(!hasWorldBook){
      const worldBook=createDefaultLorebook('心之回响·世界观');
      worldBook.description='第二中学校园世界观与场景角色设定 — 可在世界书管理页面编辑';
      worldBook.entries=[
        {...createDefaultEntry(),id:crypto.randomUUID(),keys:['学校','校园','教室','二年A班','转校生','桃花','海棠','第二中学'],content:'第二中学，桃花与海棠正盛。二年A班，林澈是转校生，苏晚晴是班长。他们坐在相邻的座位上，窗外的花瓣偶尔飘进教室。',order:10},
        {...createDefaultEntry(),id:crypto.randomUUID(),keys:['天台','屋顶','风','天空','俯瞰'],content:'第二中学的天台视野开阔，午后的风轻轻吹过。这里是独自思考和偶然相遇的好地方，可以看到远处城市的天际线。',order:20},
        {...createDefaultEntry(),id:crypto.randomUUID(),keys:['公园','海棠','长椅','喷泉','黄昏','夕阳','人民公园'],content:'学校附近的人民公园，海棠花开的季节特别美。黄昏时夕阳透过花瓣洒下斑驳的光影，喷泉声清脆悦耳。',order:30},
        {...createDefaultEntry(),id:crypto.randomUUID(),keys:['奶茶店','放学后','饮料','甜点','约会','甜韵茶语'],content:'校旁奶茶店"甜韵茶语"，暖黄灯光，墙上贴满了学生的便利贴留言。角落卡座最受欢迎，放学后人流聚集地。',order:40},
        {...createDefaultEntry(),id:crypto.randomUUID(),keys:['林澈','转校生','摄影','内敛','安静','胶片相机'],content:'林澈是新来的转校生，性格内敛沉静。喜欢用一台旧胶片相机记录生活中的美好瞬间。话不多但观察力敏锐。',order:50},
        {...createDefaultEntry(),id:crypto.randomUUID(),keys:['苏晚晴','班长','温柔','海棠','奶茶','责任心'],content:'苏晚晴是二年A班班长，温柔坚韧。喜欢海棠花和奶茶，放学后常去奶茶店坐一会儿。偶尔为小事固执己见，但总能暖心地照顾到每个人。',order:60},
      ];
      await saveLorebook(worldBook);await st.loadAll();
      const freshBooks=await getLorebooks();
      if(freshBooks.length>0){await st.updateSettings({activeLorebookIds:[freshBooks[0].id]});await st.loadAll();}
    }

    // Restore game state from DB
    await loadGameState();

    renderHome();renderDiary();renderCharacters();
    document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',function(e){if(e.target===this)this.classList.remove('open')}));

    document.addEventListener('keydown',function(e){if(e.key==='Escape')document.querySelectorAll('.modal-overlay.open,.confirm-overlay.open').forEach(m=>m.classList.remove('open'))});

  }catch(e){

}
