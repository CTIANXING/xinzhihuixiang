<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心之回响 — Heart's Echo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #08081a;
  --bg-surface: rgba(255,255,255,0.04);
  --bg-glass: rgba(20,16,40,0.85);
  --bg-glass-hover: rgba(30,24,55,0.92);
  --border-glass: rgba(255,255,255,0.08);
  --border-glow: rgba(255,107,157,0.25);
  --accent-pink: #ff6b9d;
  --accent-pink-soft: #ff8fb3;
  --accent-lavender: #b388ff;
  --accent-gold: #f0c060;
  --accent-cyan: #64d8d8;
  --text-primary: #f0e6ff;
  --text-secondary: #b0a0cc;
  --text-muted: #6e6088;
  --shadow-glow: 0 0 40px rgba(255,107,157,0.15);
  --shadow-card: 0 8px 32px rgba(0,0,0,0.3);
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --transition-fast: 0.2s cubic-bezier(0.4,0,0.2,1);
  --transition-smooth: 0.4s cubic-bezier(0.4,0,0.2,1);
  --transition-spring: 0.5s cubic-bezier(0.34,1.56,0.64,1);
  --font-serif: 'Noto Serif SC', serif;
  --font-sans: 'Noto Sans SC', system-ui, sans-serif;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html { font-size:16px; scroll-behavior:smooth; }

body {
  font-family: var(--font-sans);
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body::before {
  content: '';
  position: fixed;
  inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 20%, rgba(255,107,157,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 70% at 80% 70%, rgba(179,136,255,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 50% 50%, rgba(100,216,216,0.03) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* === Scrollbar === */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(255,107,157,0.3); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:rgba(255,107,157,0.5); }

/* === Particles Canvas === */
#particles-canvas {
  position:fixed; inset:0; z-index:0; pointer-events:none;
}

/* === App Shell === */
#app-shell {
  position:relative;
  z-index:1;
  max-width:1200px;
  margin:0 auto;
  padding:0 24px;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* === Top Navigation === */
.top-nav {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:20px 0;
  position:sticky;
  top:0;
  z-index:100;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  background:rgba(8,8,26,0.7);
  border-bottom:1px solid var(--border-glass);
}

.nav-brand {
  font-family: var(--font-serif);
  font-size:1.4rem;
  font-weight:700;
  background: linear-gradient(135deg, var(--accent-pink), var(--accent-lavender));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:0.06em;
  cursor:pointer;
  transition: var(--transition-fast);
  user-select:none;
}
.nav-brand:hover {
  background: linear-gradient(135deg, var(--accent-pink-soft), var(--accent-gold));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

.nav-links {
  display:flex;
  gap:4px;
  background: var(--bg-glass);
  border:1px solid var(--border-glass);
  border-radius: var(--radius-lg);
  padding:4px;
}

.nav-link {
  display:flex;
  align-items:center;
  gap:8px;
  font-family: var(--font-sans);
  font-size:0.88rem;
  font-weight:500;
  color: var(--text-secondary);
  background:transparent;
  border:none;
  border-radius: var(--radius-md);
  padding:10px 18px;
  cursor:pointer;
  transition: all var(--transition-fast);
  white-space:nowrap;
  position:relative;
}

.nav-link:hover {
  color: var(--text-primary);
  background: rgba(255,255,255,0.06);
}

.nav-link.active {
  color: var(--text-primary);
  background: linear-gradient(135deg, rgba(255,107,157,0.2), rgba(179,136,255,0.15));
  box-shadow: 0 0 20px rgba(255,107,157,0.1);
}

.nav-link svg { width:18px; height:18px; flex-shrink:0; }

.nav-actions {
  display:flex;
  gap:10px;
  align-items:center;
}

.nav-time {
  font-family: var(--font-serif);
  font-size:0.85rem;
  color: var(--text-muted);
  padding:8px 14px;
  background: var(--bg-glass);
  border:1px solid var(--border-glass);
  border-radius: var(--radius-md);
  display:flex;
  align-items:center;
  gap:6px;
}

.nav-time svg { width:16px; height:16px; opacity:0.6; }

/* === Page Container === */
#page-container {
  flex:1;
  position:relative;
  padding:32px 0 60px;
}

.page {
  display:none;
  animation: pageIn 0.5s cubic-bezier(0.4,0,0.2,1);
}

.page.active { display:block; }

@keyframes pageIn {
  from { opacity:0; transform:translateY(16px); }
  to { opacity:1; transform:translateY(0); }
}

/* === Home Page === */
.hero-section {
  text-align:center;
  padding:60px 0 40px;
}

.hero-title {
  font-family: var(--font-serif);
  font-size:3.2rem;
  font-weight:900;
  background: linear-gradient(135deg, #ff6b9d 0%, #f0c060 30%, #b388ff 60%, #64d8d8 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:0.12em;
  margin-bottom:8px;
  animation: titleShimmer 4s ease-in-out infinite;
  background-size:200% 200%;
}

@keyframes titleShimmer {
  0%,100% { background-position:0% 50%; }
  50% { background-position:100% 50%; }
}

.hero-subtitle {
  font-family: var(--font-serif);
  font-size:1.05rem;
  color: var(--text-secondary);
  letter-spacing:0.15em;
  margin-bottom:4px;
}

.hero-tagline {
  font-size:0.85rem;
  color: var(--text-muted);
  letter-spacing:0.08em;
}

.protagonists-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:28px;
  margin:50px 0;
}

.protag-card {
  background: var(--bg-glass);
  border:1px solid var(--border-glass);
  border-radius: var(--radius-xl);
  padding:32px;
  transition: all var(--transition-smooth);
  cursor:pointer;
  position:relative;
  overflow:hidden;
}

.protag-card::before {
  content:'';
  position:absolute;
  inset:0;
  border-radius: var(--radius-xl);
  opacity:0;
  transition: opacity var(--transition-smooth);
  z-index:0;
}

.protag-card.male::before {
  background: radial-gradient(circle at 30% 20%, rgba(100,216,216,0.08), transparent 70%);
}
.protag-card.female::before {
  background: radial-gradient(circle at 70% 20%, rgba(255,107,157,0.08), transparent 70%);
}

.protag-card:hover::before { opacity:1; }

.protag-card:hover {
  transform:translateY(-4px);
  border-color:var(--border-glow);
  box-shadow: var(--shadow-glow);
}

.protag-card > * { position:relative; z-index:1; }

.protag-header {
  display:flex;
  align-items:center;
  gap:20px;
  margin-bottom:24px;
}

.protag-avatar {
  width:72px;
  height:72px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  font-size:2rem;
  border:2px solid var(--border-glass);
}

.protag-card.male .protag-avatar {
  background: linear-gradient(135deg, rgba(100,216,216,0.2), rgba(100,180,216,0.15));
}

.protag-card.female .protag-avatar {
  background: linear-gradient(135deg, rgba(255,107,157,0.2), rgba(255,143,179,0.15));
}

.protag-info h3 {
  font-family: var(--font-serif);
  font-size:1.5rem;
  font-weight:700;
  margin-bottom:4px;
}

.protag-role {
  font-size:0.82rem;
  color: var(--text-secondary);
  letter-spacing:0.04em;
}

.protag-stats {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.stat-item {
  background: rgba(255,255,255,0.03);
  border-radius: var(--radius-sm);
  padding:12px 16px;
}

.stat-label {
  font-size:0.75rem;
  color: var(--text-muted);
  margin-bottom:6px;
  letter-spacing:0.04em;
}

.stat-value {
  font-family: var(--font-serif);
  font-size:1.1rem;
  font-weight:600;
  color: var(--text-primary);
}

.stat-bar-wrap {
  width:100%;
  height:4px;
  background:rgba(255,255,255,0.06);
  border-radius:2px;
  margin-top:8px;
  overflow:hidden;
}

.stat-bar-fill {
  height:100%;
  border-radius:2px;
  transition: width 1s cubic-bezier(0.4,0,0.2,1);
}

.stat-bar-fill.affection {
  background: linear-gradient(90deg, var(--accent-pink), var(--accent-gold));
}

.stat-bar-fill.progress {
  background: linear-gradient(90deg, var(--accent-cyan), var(--accent-lavender));
}

/* Quick Actions */
.quick-actions {
  display:flex;
  gap:16px;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:10px;
}

.quick-action-btn {
  display:flex;
  align-items:center;
  gap:10px;
  font-family: var(--font-sans);
  font-size:0.9rem;
  font-weight:500;
  color: var(--text-primary);
  background: var(--bg-glass);
  border:1px solid var(--border-glass);
  border-radius: var(--radius-lg);
  padding:14px 24px;
  cursor:pointer;
  transition: all var(--transition-fast);
}

.quick-action-btn:hover {
  background: var(--bg-glass-hover);
  border-color: var(--border-glow);
  transform:translateY(-2px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}

.quick-action-btn svg { width:20px; height:20px; flex-shrink:0; }

/* === Map Page === */
.map-header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:32px;
}

.map-title {
  font-family: var(--font-serif);
  font-size:1.6rem;
  font-weight:700;
  display:flex;
  align-items:center;
  gap:12px;
}

.map-title svg { width:26px; height:26px; color: var(--accent-pink); }

.map-controls {
  display:flex;
  gap:10px;
}

.map-control-btn {
  display:flex;
  align-items:center;
  gap:6px;
  font-family: var(--font-sans);
  font-size:0.82rem;
  font-weight:500;
  color: var(--text-primary);
  background: var(--bg-glass);
  border:1px solid var(--border-glass);
  border-radius: var(--radius-md);
  padding:10px 16px;
  cursor:pointer;
  transition: all var(--transition-fast);
}

.map-control-btn:hover {
  background: var(--bg-glass-hover);
  border-color: var(--border-glow);
}

.map-control-btn svg { width:16px; height:16px; }

.map-control-btn.expand {
  background: linear-gradient(135deg, rgba(255,107,157,0.2), rgba(179,136,255,0.1));
  border-color: rgba(255,107,157,0.3);
}

.map-grid-wrapper {
  position:relative;
}

.map-grid {
  display:grid;
  gap:16px;
  padding:10px;
}

.map-grid.size-2 { grid-template-columns: repeat(2, 1fr); }
.map-grid.size-3 { grid-template-columns: repeat(3, 1fr); }
.map-grid.size-4 { grid-template-columns: repeat(4, 1fr); }
.map-grid.size-5 { grid-template-columns: repeat(5, 1fr); }

.map-cell {
  aspect-ratio:1;
  min-height:180px;
  background: var(--bg-glass);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border:1px solid var(--border-glass);
  border-radius: var(--radius-lg);
  padding:20px;
  cursor:pointer;
  transition: all var(--transition-smooth);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  position:relative;
  overflow:hidden;
}

.map-cell::after {
  content:'';
  position:absolute;
  inset:0;
  border-radius: var(--radius-lg);
  opacity:0;
  transition: opacity var(--transition-smooth);
  pointer-events:none;
}

.map-cell:hover {
  transform:translateY(-3px) scale(1.02);
  border-color:var(--border-glow);
  box-shadow: var(--shadow-glow);
  z-index:2;
}

.map-cell:hover::after {
  opacity:1;
  background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(255,107,157,0.08), transparent 70%);
}

.map-cell.occupied { border-color: rgba(255,107,157,0.2); }
.map-cell.empty { opacity:0.5; cursor:default; }
.map-cell.empty:hover { transform:none; border-color:var(--border-glass); box-shadow:none; }
.map-cell.empty:hover::after { opacity:0; }

.map-cell.add-slot {
  border-style:dashed;
  border-color:rgba(255,255,255,0.12);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0.6;
}

.map-cell.add-slot:hover {
  opacity:1;
  border-color:var(--accent-lavender);
  transform:translateY(-3px) scale(1.02);
}

.location-name {
  font-family: var(--font-serif);
  font-size:1.15rem;
  font-weight:700;
  color: var(--text-primary);
  margin-bottom:4px;
}

.location-desc {
  font-size:0.78rem;
  color: var(--text-secondary);
  line-height:1.5;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.location-chars {
  display:flex;
  gap:6px;
  margin-top:8px;
}

.char-dot {
  width:24px;
  height:24px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:0.7rem;
  font-weight:700;
  border:2px solid var(--border-glass);
}

.char-dot.male { background:rgba(100,216,216,0.25); color:var(--accent-cyan); }
.char-dot.female { background:rgba(255,107,157,0.25); color:var(--accent-pink); }

.add-place-icon {
  width:44px;
  height:44px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  border:2px dashed rgba(255,255,255,0.25);
  color: var(--text-muted);
  transition: all var(--transition-spring);
}

.add-place-icon svg {
  width:20px;
  height:20px;
  transition: transform var(--transition-spring);
}

.map-cell.add-slot:hover .add-place-icon {
  border-color:var(--accent-lavender);
  color:var(--accent-lavender);
  border-style:solid;
  box-shadow: 0 0 20px rgba(179,136,255,0.15);
}

.map-cell.add-slot:hover .add-place-icon svg {
  transform:rotate(90deg);
}

/* === Location Detail Modal === */
.modal-overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  z-index:500;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition: opacity var(--transition-smooth);
}

.modal-overlay.open {
  opacity:1;
  pointer-events:auto;
}

.modal-panel {
  background: var(--bg-glass);
  border:1px solid var(--border-glass);
  border-radius: var(--radius-xl);
  max-width:560px;
  width:90%;
  max-height:85vh;
  overflow-y:auto;
  transform:translateY(20px) scale(0.96);
  transition: transform var(--transition-spring);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.modal-overlay.open .modal-panel {
  transform:translateY(0) scale(1);
}

.modal-header {
  padding:28px 28px 0;
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
}

.modal-location-icon {
  width:52px;
  height:52px;
  border-radius: var(--radius-md);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.5rem;
  margin-bottom:12px;
}

.modal-location-icon.rooftop { background: linear-gradient(135deg, rgba(240,192,96,0.25), rgba(240,160,80,0.15)); }
.modal-location-icon.classroom { background: linear-gradient(135deg, rgba(100,216,216,0.25), rgba(100,180,216,0.15)); }
.modal-location-icon.park { background: linear-gradient(135deg, rgba(130,200,120,0.25), rgba(100,216,150,0.15)); }
.modal-location-icon.teashop { background: linear-gradient(135deg, rgba(255,107,157,0.25), rgba(255,150,180,0.15)); }

.modal-title {
  font-family: var(--font-serif);
  font-size:1.5rem;
  font-weight:700;
}

.modal-close {
  width:36px;
  height:36px;
  border-radius:50%;
  border:1px solid var(--border-glass);
  background:transparent;
  color: var(--text-secondary);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition: all var(--transition-fast);
  flex-shrink:0;
}

.modal-close:hover {
  background: rgba(255,255,255,0.08);
  color: var(--text-primary);
}

.modal-body { padding:24px 28px 28px; }

.modal-env-desc {
  font-size:0.9rem;
  color: var(--text-secondary);
  line-height:1.8;
  margin-bottom:24px;
  padding:18px;
  background: rgba(255,255,255,0.03);
  border-radius: var(--radius-md);
  border-left:2px solid var(--accent-lavender);
}

.modal-section-title {
  font-family: var(--font-serif);
  font-size:0.85rem;
  font-weight:700;
  color: var(--text-secondary);
  margin-bottom:12px;
  letter-spacing:0.04em;
}

.modal-chars-list {
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-bottom:24px;
}

.modal-char-item {
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px;
  background:rgba(255,255,255,0.03);
  border-radius: var(--radius-sm);
  transition: background var(--transition-fast);
}

.modal-char-item:hover {
  background:rgba(255,255,255,0.06);
}

.modal-char-avatar {
  width:40px;
  height:40px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  font-size:0.9rem;
  font-weight:700;
}

.modal-char-avatar.male { background:rgba(100,216,216,0.2); color:var(--accent-cyan); }
.modal-char-avatar.female { background:rgba(255,107,157,0.2); color:var(--accent-pink); }

.modal-char-name {
  font-weight:600;
  font-size:0.9rem;
}

.modal-char-status {
  font-size:0.78rem;
  color: var(--text-muted);
  margin-top:2px;
}

.modal-actions {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.modal-action-btn {
  display:flex;
  align-items:center;
  gap:6px;
  font-family: var(--font-sans);
  font-size:0.82rem;
  font-weight:500;
  padding:10px 18px;
  border-radius: var(--radius-md);
  cursor:pointer;
  transition: all var(--transition-fast);
  border:1px solid var(--border-glass);
  background: var(--bg-glass);
  color: var(--text-primary);
}

.modal-action-btn:hover {
  background: var(--bg-glass-hover);
  border-color:var(--border-glow);
  transform:translateY(-1px);
}

.modal-action-btn.primary {
  background: linear-gradient(135deg, rgba(255,107,157,0.3), rgba(179,136,255,0.15));
  border-color:rgba(255,107,157,0.3);
}

.modal-action-btn.primary:hover {
  background: linear-gradient(135deg, rgba(255,107,157,0.4), rgba(179,136,255,0.25));
}

/* === Story Log Page === */
.story-header {
  margin-bottom:32px;
}

.story-title {
  font-family: var(--font-serif);
  font-size:1.6rem;
  font-weight:700;
  display:flex;
  align-items:center;
  gap:12px;
}

.story-title svg { width:26px; height:26px; color: var(--accent-gold); }

.story-chapter {
  font-size:0.85rem;
  color: var(--text-muted);
  margin-top:6px;
}

.timeline {
  position:relative;
  padding-left:32px;
}

.timeline::before {
  content:'';
  position:absolute;
  left:11px;
  top:0;
  bottom:0;
  width:2px;
  background: linear-gradient(180deg, var(--accent-pink), var(--accent-lavender), transparent);
}

.timeline-item {

  margin-bottom:32px;
  padding:20px 24px;
  background: var(--bg-glass);
  border:1px solid var(--border-glass);
  border-radius: var(--radius-lg);
  transition: all var(--transition-fast);
  cursor:pointer;
  overflow:hidden;

.timeline-item::after {
  content:'';
  position:absolute;
  left:0;
  top:0;
  bottom:0;
  width:0;

}

.timeline-item:hover::after {
  width:100%;
}

.timeline-item::before {
  content:'';
  position:absolute;
  left:-28px;
  top:28px;
  width:12px;
  height:12px;
  border-radius:50%;
  background: var(--accent-pink);
  border:3px solid var(--bg-deep);
  box-shadow: 0 0 10px rgba(255,107,157,0.4);

.char-profile-card::before {

.toast-container {

.toast {

  align-items:center;
  gap:12px;
  background: rgba(20,16,40,0.95);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border-glass);
  border-radius: var(--radius-md);
  padding:14px 20px;
  pointer-events:auto;

// ==================== PARTICLES ====================
function initParticles() {
  const canvas = document.getElementById('particles-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  const maxParticles = 50;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  class Particle {
    constructor() {
      this.reset();
      this.y = Math.random() * canvas.height;
    }
    reset() {
      this.x = Math.random() * canvas.width;
      this.y = -10;
      this.size = Math.random() * 2.5 + 1;
      this.speedY = Math.random() * 0.4 + 0.15;
      this.speedX = (Math.random() - 0.5) * 0.3;
      this.opacity = Math.random() * 0.35 + 0.08;
      this.wobble = Math.random() * Math.PI * 2;
      this.wobbleSpeed = Math.random() * 0.015 + 0.005;
    }
    update() {
      this.wobble += this.wobbleSpeed;
      this.x += this.speedX + Math.sin(this.wobble) * 0.2;
      this.y += this.speedY;
      if (this.y > canvas.height + 10) this.reset();
      if (this.x < -10) this.x = canvas.width + 10;
      if (this.x > canvas.width + 10) this.x = -10;
    }
    draw(ctx) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,182,193,${this.opacity})`;
      ctx.fill();
    }
  }

  for (let i = 0; i < maxParticles; i++) {
    particles.push(new Particle());
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(ctx); });
    requestAnimationFrame(animate);
  }

  animate();
}

// ==================== NAVIGATION ====================
function navigateTo(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));

  const targetPage = document.getElementById(`page-${page}`);
  if (targetPage) targetPage.classList.add('active');

  const navLink = document.getElementById(`nav-${page}`);
  if (navLink) navLink.classList.add('active');

  if (page === 'map') renderMap();
  if (page === 'story') renderStory();
  if (page === 'characters') renderCharacters();
}

function getActiveLocations() {
  return [...Locations, ...customLocations];
}

function renderMap() {
  const grid = document.getElementById('map-grid');
  grid.className = `map-grid size-${mapSize}`;
  const allLocations = getActiveLocations();
  const totalCells = mapSize * mapSize;
  let html = '';

  for (let i = 0; i < totalCells; i++) {
    const loc = allLocations[i];
    if (loc) {
      const charHtml = (loc.characters || []).map(cid => {
        const ch = gameCharacters.find(c => c.id === cid);
        if (!ch) return '';
        return `<span class="char-dot ${ch.gender}" title="${ch.name}">${ch.name[0]}</span>`;
      }).join('');
      html += `
        <div class="map-cell occupied" id="map-cell-${loc.id}" onclick="openLocationDetail('${loc.id}')" onmousemove="handleCellHover(event, this)">
          <div>
            <div class="location-name">${loc.name}</div>
            <div class="location-desc">${loc.description.slice(0, 40)}...</div>
          </div>
          <div class="location-chars">${charHtml || '<span style="font-size:0.75rem;color:var(--text-muted)">暂无角色</span>'}</div>
        </div>`;
    } else if (i === allLocations.length) {
      // Only one "add" slot at the end
      html += `
        <div class="map-cell add-slot" onclick="openAddLocationModal(${i})" id="map-cell-add">
          <div class="add-place-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
          <div style="margin-top:10px;font-size:0.8rem;color:var(--text-muted)">添加新地点</div>
        </div>`;
    } else {
      html += `<div class="map-cell empty"></div>`;
    }
  }

  grid.innerHTML = html;
}

function handleCellHover(e, cell) {
  const rect = cell.getBoundingClientRect();
  const x = ((e.clientX - rect.left) / rect.width * 100).toFixed(0);
  const y = ((e.clientY - rect.top) / rect.height * 100).toFixed(0);
  cell.style.setProperty('--mx', x + '%');
  cell.style.setProperty('--my', y + '%');
}

  const allLocations = getActiveLocations();
  const loc = allLocations.find(l => l.id === locId);
  if (!loc) return;

  const messages = {
    talk: `与「${loc.name}」的角色进行对话`,
    observe: `仔细观察「${loc.name}」的环境`,
    move: `移动到「${loc.name}」`
  };

  closeModal('modal-location');
  showToast(messages[action] || '执行操作', 'success');

  if (action === 'move') {
    // Update character status based on movement
    const male = gameCharacters.find(c => c.id === 'male');
    if (male) male.status = `${loc.name}内`;
    renderCharacters();
  }
}

  const c = gameCharacters.find(ch => ch.id === charId);
  if (!c) return;

  const panel = document.getElementById('modal-char-detail-panel');
  const overlay = document.getElementById('modal-char-detail');
  const affectionPercent = c.affectionMax > 0 ? (c.affection / c.affectionMax * 100) : 0;

  panel.innerHTML = `
    <div class="modal-header">
      <div style="display:flex;align-items:center;gap:16px;">
        <div class="modal-char-avatar ${c.gender}" style="width:48px;height:48px;font-size:1.1rem;">${c.name[0]}</div>
        <div>
          <div class="modal-title">${c.name}</div>
          <div style="font-size:0.8rem;color:var(--text-muted);margin-top:2px;">${c.role}</div>
        </div>
      </div>
      <button class="modal-close" onclick="closeModal('modal-char-detail')" id="modal-char-close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;">
        <div style="background:rgba(255,255,255,0.03);border-radius:var(--radius-sm);padding:14px;">
          <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:4px;">生日</div>
          <div style="font-weight:500;">${c.birthday}</div>
        </div>
        <div style="background:rgba(255,255,255,0.03);border-radius:var(--radius-sm);padding:14px;">
          <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:4px;">身高</div>
          <div style="font-weight:500;">${c.height}</div>
        </div>
        <div style="background:rgba(255,255,255,0.03);border-radius:var(--radius-sm);padding:14px;">
          <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:4px;">所属</div>
          <div style="font-weight:500;">${c.affiliation}</div>
        </div>
        <div style="background:rgba(255,255,255,0.03);border-radius:var(--radius-sm);padding:14px;">
          <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:4px;">当前所在</div>
          <div style="font-weight:500;">${c.status}</div>
        </div>
      </div>
      <div style="margin-bottom:16px;">
        <div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:4px;">性格特征</div>
        <div style="font-size:0.9rem;color:var(--text-primary);">${c.traits}</div>
      </div>
      <div style="margin-bottom:16px;">
        <div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:4px;">喜好</div>
        <div style="font-size:0.9rem;color:var(--text-primary);">${c.likes}</div>
      </div>
      <div style="margin-top:20px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
          <span style="font-size:0.8rem;color:var(--text-muted);">好感度</span>
          <span style="font-size:0.9rem;font-weight:600;">${c.affection} / ${c.affectionMax}</span>
        </div>
        <div class="char-affection-bar" style="height:6px;">
          <div class="char-affection-fill ${affectionPercent > 40 ? 'high' : 'medium'}" style="width:${affectionPercent}%"></div>
        </div>
      </div>
      <div class="modal-actions" style="margin-top:24px;">
        <button class="modal-action-btn primary" onclick="handleCharacterInteraction('${c.id}')" id="modal-char-interact">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
          互动对话
        </button>
      </div>
    </div>
  `;

  overlay.classList.add('open');
}

function handleCharacterInteraction(charId) {
  const c = gameCharacters.find(ch => ch.id === charId);
  if (!c) return;
  closeModal('modal-char-detail');
  showToast(`与「${c.name}」展开对话`, 'success');
}

function handleContinueStory() {
  showToast('剧情继续推进中...', 'info');
  if (gameCharacters[1].affection < 100) {
    gameCharacters[1].affection = Math.min(100, gameCharacters[1].affection + 5);
  }
  if (currentPage === 'characters') renderCharacters();
}

function handleStoryEntryClick(title) {
  showToast(`回顾剧情：「${title}」`, 'info');
}

// ==================== TOASTS ====================
function showToast(message, type = 'info') {
  const container = document.getElementById('toast-container');
  const id = 'toast-' + Date.now();
  const iconMap = {
    success: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
    info: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',
    warning: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>'
  };

  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.id = id;
  toast.innerHTML = `
    <div class="toast-icon ${type}">${iconMap[type]}</div>
    <div class="toast-message">${message}</div>
    <button class="toast-close" onclick="dismissToast('${id}')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  `;

  container.appendChild(toast);
  requestAnimationFrame(() => { toast.classList.add('visible'); });

  setTimeout(() => dismissToast(id), 3500);
}

function dismissToast(id) {
  const toast = document.getElementById(id);
  if (!toast) return;
  toast.classList.remove('visible');
  setTimeout(() => { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 400);
}

// ==================== CONFIRM DIALOG ====================
let confirmCallback = null;

function showConfirm(message, callback) {
  document.getElementById('confirm-message').textContent = message;
  document.getElementById('confirm-action').onclick = () => {
    hideConfirm();
    if (callback) callback();
  };
  document.getElementById('confirm-dialog').classList.add('open');
  confirmCallback = callback;
}

function hideConfirm() {
  document.getElementById('confirm-dialog').classList.remove('open');
  confirmCallback = null;
}

// ==================== INIT ====================
function init() {
  // Click outside modal to close
  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', function(e) {
      if (e.target === this) {
        this.classList.remove('open');
      }
    });
  });

  document.getElementById('confirm-dialog').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });

  // Keyboard escape for modals
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      document.querySelectorAll('.modal-overlay.open, .confirm-overlay.open').forEach(m => {
        m.classList.remove('open');
      });
    }
  });

  // Initial renders
  renderStory();
  renderCharacters();
  if (currentPage === 'map') renderMap();

  // Update time display
  updateTimeDisplay();

  // Nav link click handlers
  document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', function() {
      navigateTo(this.dataset.page);
    });
  });
}

function updateTimeDisplay() {
  const now = new Date();
  const hours = now.getHours();
  let timeLabel = '午前';
  if (hours >= 12 && hours < 17) timeLabel = '午后';
  else if (hours >= 17 && hours < 20) timeLabel = '黄昏';
  else if (hours >= 20 || hours < 5) timeLabel = '夜间';

  document.getElementById('time-display').textContent = `第 1 天 · ${timeLabel}`;
}

init();
initParticles();
</script>
